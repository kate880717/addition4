<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>두 자리 수 덧셈과 뺄셈 — 일이와 십이</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --intro-bg-1:#FFF6D6;--intro-bg-2:#FFE9A8;--intro-accent:#FFC23C;--intro-text:#6B4A00;
  --gather-bg-1:#FFE0E0;--gather-bg-2:#FFB3B3;--gather-accent:#FF5252;--gather-deep:#B81010;
  --split-bg-1:#DCEEFF;--split-bg-2:#A8C8F0;--split-accent:#3A8DDE;--split-deep:#1A4D80;
  --merge-bg-1:#FFF6D6;--merge-bg-2:#FFD980;--merge-accent:#D89B00;--merge-deep:#6B4A00;
  --card-bg:#fff;--card-shadow:0 8px 20px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.06);
  --radius:22px;--radius-sm:14px;
  --font-display:'Jua',system-ui,sans-serif;
  --font-body:'Nanum Gothic',system-ui,sans-serif;
  --correct:#2EBD6B;--wrong:#F25C5C;--highlight:#FFE600;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font-body);font-weight:700;user-select:none}
body{background:linear-gradient(180deg,#FFF8DD,#FFE9A8);color:#333}
#app{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
#stage{position:relative;width:1280px;height:800px;transform-origin:center center;overflow:hidden}
.topbar{position:absolute;top:0;left:0;right:0;height:64px;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-bottom:3px solid rgba(0,0,0,.06);display:flex;align-items:center;padding:0 20px;z-index:100;gap:16px}
.topbar .home-btn{width:44px;height:44px;border-radius:12px;background:var(--intro-accent);border:none;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.topbar .home-btn:hover{transform:scale(1.08)}
.topbar .title{font-family:var(--font-display);font-size:22px;color:#333;flex:1}
.topbar .progress{height:40px;width:220px;background:#E5E7EB;border-radius:20px;overflow:hidden;position:relative}
.topbar .progress-fill{height:100%;background:linear-gradient(90deg,#5BB836,#2F7A12);border-radius:20px;width:0%;transition:width .5s}
.topbar .progress-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:18px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.topbar .toggle-btn{width:44px;height:44px;border-radius:12px;border:2px solid #E5E7EB;background:#fff;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.topbar .toggle-btn:hover{transform:scale(1.08)}
.topbar .toggle-btn.active{background:var(--intro-accent);border-color:var(--intro-accent)}
.screen{position:absolute;top:64px;left:0;right:0;bottom:0;opacity:0;pointer-events:none;transition:opacity .4s;display:flex;flex-direction:column;overflow:hidden}
.screen.active{opacity:1;pointer-events:auto}
.theme-intro{background:radial-gradient(ellipse at 20% 30%,rgba(255,255,255,.6) 0%,transparent 50%),radial-gradient(ellipse at 80% 70%,rgba(255,194,60,.4) 0%,transparent 50%),linear-gradient(180deg,var(--intro-bg-1),var(--intro-bg-2))}
.theme-gather{background:radial-gradient(ellipse at 15% 20%,rgba(255,255,255,.5) 0%,transparent 50%),radial-gradient(ellipse at 85% 80%,rgba(91,184,54,.3) 0%,transparent 50%),linear-gradient(180deg,var(--gather-bg-1),var(--gather-bg-2))}
.theme-split{background:radial-gradient(ellipse at 15% 20%,rgba(255,255,255,.5) 0%,transparent 50%),radial-gradient(ellipse at 85% 80%,rgba(255,111,168,.3) 0%,transparent 50%),linear-gradient(180deg,var(--split-bg-1),var(--split-bg-2))}
.theme-merge{background:radial-gradient(ellipse at 15% 20%,rgba(255,255,255,.5) 0%,transparent 50%),radial-gradient(ellipse at 85% 80%,rgba(58,141,222,.3) 0%,transparent 50%),linear-gradient(180deg,var(--merge-bg-1),var(--merge-bg-2))}
.instruction{margin:18px auto 8px;padding:14px 28px;background:#fff;border-radius:999px;box-shadow:var(--card-shadow);font-family:var(--font-display);font-size:32px;color:#333;max-width:80%;text-align:center;animation:pop .6s cubic-bezier(.34,1.56,.64,1);position:relative;z-index:5}
@keyframes pop{0%{transform:translateY(-30px) scale(.85);opacity:0}100%{transform:translateY(0) scale(1);opacity:1}}
.instruction .emph{color:var(--gather-deep);font-size:38px}
.theme-split .instruction .emph{color:var(--split-deep)}
.theme-merge .instruction .emph{color:var(--merge-accent)}

/* TTS 글자 단위 하이라이트 */
.tts-char{display:inline-block;transition:all .1s}
.tts-char.active{background:var(--highlight);color:#111;padding:0 2px;border-radius:6px;transform:scale(1.08)}

/* 튜토리얼 (버튼 바로 근처) */
.tutorial-hint{font-family:var(--font-display);font-size:22px;color:#555;background:#FFF8DD;padding:8px 20px;border-radius:999px;display:inline-flex;gap:8px;align-items:center;margin-top:6px;animation:pop .5s;border:2px solid #FFE9A8}

.big-btn{font-family:var(--font-display);font-size:30px;padding:16px 42px;border:none;border-radius:999px;background:linear-gradient(180deg,#FFC23C,#FF9C00);color:#fff;box-shadow:0 6px 0 #C77800,0 12px 24px rgba(0,0,0,.15);cursor:pointer;transition:all .12s;text-shadow:0 2px 0 rgba(0,0,0,.15)}
.big-btn:hover{transform:translateY(-2px)}
.big-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #C77800,0 4px 8px rgba(0,0,0,.1)}
.big-btn.green{background:linear-gradient(180deg,#6DD840,#2F9F0E);box-shadow:0 6px 0 #1F6E08,0 12px 24px rgba(0,0,0,.15)}
.big-btn.pink{background:linear-gradient(180deg,#FF87BA,#E04A88);box-shadow:0 6px 0 #9E2F5E,0 12px 24px rgba(0,0,0,.15)}
.big-btn.blue{background:linear-gradient(180deg,#5BB0FF,#2274D6);box-shadow:0 6px 0 #15528F,0 12px 24px rgba(0,0,0,.15)}
.big-btn.gray{background:linear-gradient(180deg,#C0C7D0,#94A3B8);box-shadow:0 6px 0 #4B5563,0 12px 24px rgba(0,0,0,.15)}
.big-btn.small{font-size:22px;padding:12px 26px;box-shadow:0 4px 0 rgba(0,0,0,.2),0 6px 12px rgba(0,0,0,.1)}
.big-btn:disabled{opacity:.4;cursor:not-allowed}
.skip-btn{background:rgba(255,255,255,.7);border:2px solid rgba(0,0,0,.1);padding:10px 24px;border-radius:999px;font-family:var(--font-display);font-size:18px;color:#666;cursor:pointer}
.skip-btn:hover{background:#fff}

.mic-gate{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:30px;text-align:center}
.mic-gate .big-mic{font-size:120px;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.setup-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:30px}
.setup-card{background:#fff;border-radius:var(--radius);padding:36px 60px;box-shadow:var(--card-shadow);max-width:760px;width:100%}
.setup-card h2{font-family:var(--font-display);font-size:36px;color:var(--intro-text);margin-bottom:20px;text-align:center}
.setup-row{margin:16px 0}
.setup-row label{font-family:var(--font-display);font-size:24px;color:#444;display:block;margin-bottom:8px}
.setup-row select{width:100%;padding:14px 18px;font-family:var(--font-display);font-size:24px;border:3px solid #FFC23C;border-radius:14px;background:#FFFEF0;cursor:pointer;outline:none}
.choice-row{display:flex;gap:14px;justify-content:center;margin-top:10px}
.choice-row button{flex:1;font-family:var(--font-display);font-size:28px;padding:18px 0;border:4px solid #DDD;border-radius:18px;background:#fff;cursor:pointer;transition:all .15s}
.choice-row button:hover{border-color:var(--gather-accent);transform:translateY(-2px)}
.choice-row button.selected{background:linear-gradient(180deg,#9CE970,var(--gather-accent));color:#fff;border-color:var(--gather-deep);box-shadow:0 4px 0 var(--gather-deep)}

.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:30px}
.app-title{font-family:var(--font-display);font-size:86px;color:var(--intro-text);text-align:center;line-height:1;text-shadow:4px 4px 0 rgba(255,255,255,.7);animation:bounce 1.2s cubic-bezier(.34,1.56,.64,1)}
@keyframes bounce{0%{transform:translateY(-50px) scale(.7);opacity:0}100%{transform:translateY(0) scale(1);opacity:1}}
.subtitle{font-family:var(--font-display);font-size:28px;color:#8a6800;opacity:.85}
.mascots{display:flex;gap:80px;margin:8px 0}
.mascot-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.mascot-name{font-family:var(--font-display);font-size:22px;padding:6px 18px;border-radius:999px;color:#fff}
.mascot-name.m{background:var(--gather-deep)}
.mascot-name.n{background:var(--split-deep)}

/* 오늘의 목표 — 백워드 설계 */
.goals-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:20px}
.goals-title{font-family:var(--font-display);font-size:44px;color:var(--intro-text);background:#fff;padding:14px 50px;border-radius:999px;box-shadow:var(--card-shadow);display:flex;align-items:center;gap:12px}
.goal-list{background:#FFFBE5;border:4px dashed var(--intro-accent);border-radius:var(--radius);padding:24px 36px;display:flex;flex-direction:column;gap:14px;box-shadow:var(--card-shadow);max-width:840px}
.goal-item{font-family:var(--font-display);font-size:28px;color:#4a3500;display:flex;align-items:center;gap:14px;opacity:0;animation:goal-in .6s forwards}
.goal-item:nth-child(1){animation-delay:.2s}.goal-item:nth-child(2){animation-delay:.5s}.goal-item:nth-child(3){animation-delay:.8s}
@keyframes goal-in{0%{transform:translateX(-30px);opacity:0}100%{transform:translateX(0);opacity:1}}
.goal-icon{width:44px;height:44px;background:var(--intro-accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}

/* 탐구질문 팝업 */
.inquiry-modal{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:300;animation:fade-in .3s}
@keyframes fade-in{0%{opacity:0}100%{opacity:1}}
.inquiry-card{background:#fff;border-radius:var(--radius);padding:30px 40px;max-width:680px;box-shadow:0 16px 40px rgba(0,0,0,.3);animation:pop .5s cubic-bezier(.34,1.56,.64,1);text-align:center}
.inquiry-card .icon{font-size:60px}
.inquiry-card h2{font-family:var(--font-display);font-size:32px;color:var(--intro-text);margin:8px 0}
.inquiry-card .answer-box{background:#FFFBE5;border:3px dashed var(--intro-accent);border-radius:16px;padding:16px;font-family:var(--font-display);font-size:22px;color:#4a3500;margin:14px 0;line-height:1.5;text-align:left}

/* 녹음 — 단순화 */
.record-wrap{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px 20px;gap:14px;overflow-y:auto;position:relative}
.record-wrap.post-followup-mode{padding-bottom:40px !important}
.record-wrap.post-followup-mode .mascot-corner,.record-wrap.post-followup-mode .speech,.record-wrap.post-followup-mode .record-bottom,.record-wrap.post-followup-mode .record-meaning{display:none}
.record-meaning{background:#fff;border-radius:var(--radius);padding:12px 30px;box-shadow:var(--card-shadow);font-family:var(--font-display);font-size:24px;text-align:center;max-width:780px}
.record-meaning.pre{border:4px solid #93C5FD;color:#1E40AF}
.record-meaning.post{border:4px solid #6EE7B7;color:#065F46}
.record-meaning .small{font-size:20px;color:#666;display:block;margin-top:2px}
.record-center{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:8px}
.record-btn-huge{width:180px;height:180px;border-radius:50%;background:linear-gradient(180deg,#FF6464,#D03030);border:8px solid #fff;box-shadow:0 10px 30px rgba(0,0,0,.25),0 0 0 8px rgba(255,100,100,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.record-btn-huge:hover{transform:scale(1.05)}
.record-btn-huge.recording{animation:pulse-rec 1.2s infinite}
.record-btn-huge .dot-big{width:70px;height:70px;background:#fff;border-radius:50%;transition:all .2s}
.record-btn-huge.recording .dot-big{width:50px;height:50px;border-radius:10px}
.stt-display{background:#fff;border-radius:18px;padding:14px 24px;border:3px solid #E5E7EB;max-width:780px;width:90%;box-shadow:var(--card-shadow);min-height:80px}
.stt-label{font-family:var(--font-display);font-size:20px;color:#666;margin-bottom:6px}
.stt-text{font-family:var(--font-body);font-size:26px;color:#222;line-height:1.5;min-height:32px}
.record-bottom{display:flex;gap:14px;margin-top:auto;align-items:center}

/* 빛 폭발 */
.burst-effect{position:fixed;border-radius:50%;pointer-events:none;z-index:1000;background:radial-gradient(circle,rgba(255,230,0,.9) 0%,rgba(255,180,0,.4) 40%,transparent 70%);animation:burst-pop .7s ease-out forwards}
@keyframes burst-pop{0%{transform:translate(-50%,-50%) scale(0);opacity:1}50%{transform:translate(-50%,-50%) scale(1.5);opacity:1}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0}}
@keyframes pulse-rec{0%,100%{box-shadow:0 10px 30px rgba(0,0,0,.25),0 0 0 8px rgba(255,100,100,.3)}50%{box-shadow:0 10px 30px rgba(0,0,0,.25),0 0 0 22px rgba(255,100,100,.5)}}

/* 마스코트 반응 */
.mascot-jumping{animation:mascot-jump .6s ease-out}
@keyframes mascot-jump{0%,100%{transform:translateY(0)}30%{transform:translateY(-30px) rotate(-8deg)}60%{transform:translateY(-15px) rotate(5deg)}}

/* 객체 떨림 (모으기 준비 신호) */
.shake-prepare{animation:shake-prepare .35s ease-in-out}
@keyframes shake-prepare{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* 키패드 — 화면 하단 고정 */
.keypad{position:absolute;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(12,1fr);gap:8px;padding:14px 16px;background:#fff;border-top:3px solid rgba(0,0,0,.1);box-shadow:0 -4px 20px rgba(0,0,0,.08);z-index:50;min-height:96px}
.keypad .key{padding:14px 0;font-family:var(--font-display);font-size:32px;background:#fff;border:3px solid #DDD;border-radius:14px;cursor:pointer;color:#333;box-shadow:0 4px 0 #BBB;transition:all .12s;user-select:none;-webkit-tap-highlight-color:transparent}
.keypad .key:hover{background:#F9FAFB;transform:translateY(-1px)}
.keypad .key:active{transform:translateY(3px);box-shadow:0 1px 0 #BBB}
.keypad .key.del{background:#FEE2E2;color:#DC2626;border-color:#FCA5A5;box-shadow:0 4px 0 #DC2626;font-size:28px}
.keypad .key.check{background:linear-gradient(180deg,#5BB0FF,#2274D6);color:#fff;border-color:#15528F;font-size:22px;box-shadow:0 4px 0 #15528F}
.keypad .key.check:disabled{background:#D1D5DB;color:#9CA3AF;border-color:#9CA3AF;box-shadow:0 4px 0 #9CA3AF;cursor:not-allowed}

/* 키패드 있을 때 — 마스코트·말풍선 키패드 위로 */
.activity.has-keypad{padding-bottom:130px}
.activity.has-keypad .mascot-corner{bottom:130px;width:100px}
.activity.has-keypad .speech{bottom:230px;font-size:22px}

/* 답 입력 박스 — 점선 박스 + 깜박이는 커서 */
.num-tile.target.empty.input-active{border-style:dashed;border-color:#5BB0FF;background:#F0F7FF;color:#5BB0FF;animation:input-pulse 1.5s ease-in-out infinite}
@keyframes input-pulse{0%,100%{box-shadow:0 0 0 0 rgba(91,176,255,.5)}50%{box-shadow:0 0 0 8px rgba(91,176,255,0)}}
.num-tile.input-active::after{content:'';display:none}
.cursor-blink{display:inline-block;width:5px;height:60px;background:#5BB0FF;animation:cursor-blink 0.9s infinite;vertical-align:middle;border-radius:2px}
@keyframes cursor-blink{0%,50%{opacity:1}51%,100%{opacity:0}}

/* 활동 영역 패딩 — 키패드 공간 확보 */
.activity.has-keypad{padding-bottom:120px}

/* 카운팅 팝업 — 1,2,3... 세는 시각화 */
.count-popup{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(0);background:#fff;border-radius:28px;padding:24px 36px;z-index:1500;box-shadow:0 24px 60px rgba(0,0,0,.3);min-width:380px;max-width:90vw;border:6px solid #FFC23C;animation:popup-in .5s cubic-bezier(0.34,1.56,0.64,1) forwards}
.count-popup.split-pop{border-color:#FF6FA8}
@keyframes popup-in{to{transform:translate(-50%,-50%) scale(1)}}
.count-popup .pop-title{font-family:var(--font-display);font-size:24px;color:#666;text-align:center;margin-bottom:8px}
.count-popup .pop-items{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:12px 0;padding:14px;background:#FFFEF0;border-radius:14px;min-height:60px}
.count-popup.split-pop .pop-items{background:#FFF5FA}
.count-popup .pop-item{position:relative;display:inline-block;transition:all .2s}
.count-popup .pop-item.counting{transform:scale(1.35);filter:drop-shadow(0 0 12px #FFE600)}
.count-popup .pop-item.counted{filter:drop-shadow(0 0 4px rgba(255,194,60,.5))}
.count-popup .num-tag{position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-family:var(--font-display);font-size:22px;color:#fff;background:#FFC23C;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.2);opacity:0;transition:opacity .2s}
.count-popup.split-pop .num-tag{background:#FF6FA8}
.count-popup .pop-item.counting .num-tag,.count-popup .pop-item.counted .num-tag{opacity:1}
.count-popup .big-num{font-family:var(--font-display);font-size:88px;color:var(--gather-deep);text-align:center;opacity:0;transform:scale(.3);transition:all .5s cubic-bezier(0.34,1.56,0.64,1);line-height:1;margin-top:6px}
.count-popup.split-pop .big-num{color:var(--split-deep)}
.count-popup .big-num.show{opacity:1;transform:scale(1)}
.count-popup .big-num .unit{font-size:42px;color:#777}
.count-popup .two-plates{display:flex;gap:24px;justify-content:center;align-items:flex-start}
.count-popup .plate{flex:1;text-align:center}
.count-popup .plate .pop-items{justify-content:center}

/* 자기평가 + 스티커 */
.self-eval{background:#fff;border-radius:var(--radius);padding:14px 30px;box-shadow:var(--card-shadow);text-align:center;animation:pop .5s;margin-top:6px}
.self-eval h3{font-family:var(--font-display);font-size:24px;color:#444;margin-bottom:8px}
.star-row{display:flex;gap:8px;justify-content:center;font-size:50px;margin:4px 0}
.star{cursor:pointer;color:#DDD;transition:all .2s;filter:grayscale(1)}
.star.filled{color:#FFC23C;filter:grayscale(0);transform:scale(1.1);animation:star-pop .3s}
@keyframes star-pop{0%{transform:scale(.8) rotate(-20deg)}100%{transform:scale(1.1) rotate(0)}}
.sticker-box{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--card-shadow);text-align:center}
.sticker-box h3{font-family:var(--font-display);font-size:24px;color:#444;margin-bottom:10px}
.sticker-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.sticker-btn{font-size:48px;cursor:pointer;padding:8px;background:#F9FAFB;border:4px solid #E5E7EB;border-radius:14px;transition:all .2s}
.sticker-btn:hover{transform:scale(1.1) rotate(-5deg);background:#FEF3C7}
.sticker-btn.picked{background:#FEF3C7;border-color:#F59E0B;animation:wiggle .4s}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-10deg) scale(1.15)}75%{transform:rotate(10deg) scale(1.15)}}

/* 활동 영역 */
.activity{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 30px 20px;gap:12px;overflow:hidden}
.activity-canvas{flex:1;width:100%;display:flex;align-items:center;justify-content:center;position:relative;gap:24px}.num-tile{width:140px;height:110px;border-radius:var(--radius-sm);background:linear-gradient(180deg,#F2D7A8,#D9A86A);border:4px solid #B5854A;box-shadow:0 4px 0 #8C5F2D,0 8px 16px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:56px;color:#4A2C0E;transition:all .18s}
.num-tile.empty{background:#FFFCEF;border:4px dashed #C0A475;box-shadow:none;color:transparent}
.num-tile.target{background:linear-gradient(180deg,#FFEC9E,#FFC23C);border-color:#B58200;font-size:68px}
.num-tile.correct-fill{animation:tile-correct .5s ease-out}
@keyframes tile-correct{0%{transform:scale(.5);background:linear-gradient(180deg,#9CE970,var(--correct))}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.num-tile.shake{animation:shake-x .4s}
@keyframes shake-x{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.objects-box{background:#fff;border:5px solid var(--gather-deep);border-radius:var(--radius);padding:18px;min-width:240px;min-height:160px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;box-shadow:var(--card-shadow);position:relative}
.theme-split .objects-box{border-color:var(--split-deep)}
.objects-box .obj{animation:obj-pop .4s cubic-bezier(.34,1.56,.64,1) backwards}
@keyframes obj-pop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.choices{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.choice-btn{min-width:100px;padding:18px 26px;background:#fff;border:4px solid #DDD;border-radius:var(--radius-sm);font-family:var(--font-display);font-size:44px;color:#333;cursor:pointer;box-shadow:0 4px 0 #BBB,0 8px 16px rgba(0,0,0,.1);transition:all .15s}
.choice-btn:hover{transform:translateY(-3px);border-color:var(--gather-accent)}
.choice-btn:active{transform:translateY(2px)}
.choice-btn.correct{background:linear-gradient(180deg,#9CE970,var(--correct));border-color:var(--correct);color:#fff;animation:tile-correct .5s}
.choice-btn.wrong{background:#FFD3D3;border-color:var(--wrong);color:var(--wrong);animation:shake-x .4s}

/* 분지 트리 */
.branch-tree{position:relative;display:flex;flex-direction:column;align-items:center;gap:30px;padding:10px}
.branch-tree .tree-svg{position:absolute;inset:0;pointer-events:none;z-index:1}
.branch-tree .row{display:flex;gap:100px;z-index:2;position:relative}
.branch-tree .slot,.branch-tree .anchor{width:110px;height:110px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:60px}
.branch-tree .anchor{background:linear-gradient(180deg,#FFEC9E,#FFC23C);border:4px solid #B58200;box-shadow:0 4px 0 #8C5F2D,0 8px 16px rgba(0,0,0,.15);color:#4A2C0E}
.branch-tree .slot.empty{background:#FFFCEF;border:4px dashed #C0A475;color:#C0A475;cursor:pointer;transition:all .18s}
.branch-tree .slot.empty:hover{background:#FFF3D8;transform:scale(1.04)}
.branch-tree .slot.empty.active{border-color:var(--highlight);background:#FFFEE6;box-shadow:0 0 0 6px rgba(255,230,0,.4);animation:slot-pulse 1.2s infinite}
@keyframes slot-pulse{0%,100%{box-shadow:0 0 0 6px rgba(255,230,0,.4)}50%{box-shadow:0 0 0 14px rgba(255,230,0,.2)}}
.branch-tree .slot.filled{background:linear-gradient(180deg,#FFEC9E,#FFC23C);border:4px solid #B58200;color:#4A2C0E;box-shadow:0 4px 0 #8C5F2D,0 8px 16px rgba(0,0,0,.15);animation:tile-correct .5s}
.option-panel{display:flex;flex-wrap:wrap;gap:12px;padding:16px;background:rgba(255,255,255,.6);border-radius:var(--radius);border:3px dashed rgba(0,0,0,.1);max-width:330px;justify-content:center}
.option-panel .opt-card{width:80px;height:80px;border-radius:var(--radius-sm);background:linear-gradient(180deg,#F2D7A8,#D9A86A);border:4px solid #B5854A;box-shadow:0 4px 0 #8C5F2D,0 6px 14px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:46px;color:#4A2C0E;cursor:pointer;transition:all .15s;user-select:none}
.option-panel .opt-card:hover{transform:translateY(-4px) scale(1.05)}
.option-panel .opt-card.active{border-color:var(--highlight);background:linear-gradient(180deg,#FFEC9E,#FFC23C);box-shadow:0 0 0 5px rgba(255,230,0,.5),0 4px 0 #8C5F2D;transform:translateY(-6px) scale(1.08)}
.option-panel .opt-card.used{visibility:hidden}

/* 마스코트·말풍선 자리 확보 — 모든 화면 콘텐츠는 하단 180px 비워둠 */
.mic-gate,.setup-wrap,.goals-wrap,.record-wrap,.cert-wrap{padding-bottom:200px !important}

.mascot-corner{position:absolute;bottom:18px;left:22px;width:130px;z-index:10;pointer-events:none;animation:bob 3s ease-in-out infinite}
.mascot-corner.right{left:auto;right:22px}
.speech{position:absolute;bottom:120px;left:160px;background:#fff;border:3px solid #333;border-radius:20px;padding:10px 18px;font-family:var(--font-display);font-size:22px;box-shadow:var(--card-shadow);max-width:360px;z-index:11;line-height:1.3}
.speech::before{content:'';position:absolute;bottom:16px;left:-14px;border:9px solid transparent;border-right-color:#333}
.speech::after{content:'';position:absolute;bottom:17px;left:-10px;border:8px solid transparent;border-right-color:#fff}

.feedback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:200}
.feedback-card{background:#fff;border-radius:var(--radius);padding:22px 38px;box-shadow:0 16px 40px rgba(0,0,0,.2);font-family:var(--font-display);font-size:32px;text-align:center;border:6px solid var(--correct);color:var(--correct);opacity:0;transform:scale(.5)}
.feedback-card.wrong{border-color:var(--wrong);color:var(--wrong)}
.feedback.show .feedback-card{animation:fb-pop .5s forwards}
@keyframes fb-pop{0%{opacity:0;transform:scale(.3) rotate(-10deg)}60%{opacity:1;transform:scale(1.15) rotate(3deg)}100%{opacity:1;transform:scale(1) rotate(0)}}

.confetti{position:absolute;inset:0;pointer-events:none;z-index:150;overflow:hidden}
.confetti-piece{position:absolute;width:14px;height:14px;animation:confetti-fall 1.6s ease-out forwards}
@keyframes confetti-fall{0%{transform:translateY(-20vh) rotate(0deg);opacity:1}100%{transform:translateY(90vh) rotate(720deg);opacity:0}}

.cert-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:14px}
.cert-card{width:920px;background:radial-gradient(circle at 20% 30%,rgba(255,194,60,.25),transparent 60%),radial-gradient(circle at 80% 70%,rgba(255,111,168,.25),transparent 60%),linear-gradient(180deg,#FFFEF0,#FFF6D6);border:10px double var(--intro-accent);border-radius:28px;box-shadow:0 16px 40px rgba(0,0,0,.18);padding:20px 28px;animation:cert-in 1s cubic-bezier(.34,1.56,.64,1)}
@keyframes cert-in{0%{transform:translateY(40px) rotate(-2deg);opacity:0}100%{transform:translateY(0) rotate(0);opacity:1}}
.cert-card h1{font-family:var(--font-display);font-size:42px;color:var(--intro-text);text-align:center;text-shadow:3px 3px 0 rgba(255,255,255,.7)}
.cert-name{font-family:var(--font-display);font-size:28px;color:var(--gather-deep);background:#fff;padding:6px 24px;border-radius:999px;border:3px dashed var(--gather-accent);margin:4px auto;display:inline-block}
.cert-compare{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:10px 0}
.cert-box{background:#fff;border-radius:14px;padding:12px 16px;min-height:100px}
.cert-box.pre{border:4px solid #93C5FD}
.cert-box.post{border:4px solid #6EE7B7}
.cert-box h3{font-family:var(--font-display);font-size:20px;margin-bottom:4px}
.cert-box.pre h3{color:#1E40AF}
.cert-box.post h3{color:#065F46}
.cert-box p{font-family:var(--font-body);font-size:18px;color:#333;line-height:1.4}

/* 대시보드 */
.dashboard{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:8px 0;border-top:2px dashed #FFC23C;margin-top:6px}
.dash-card{background:#fff;border-radius:14px;padding:10px;text-align:center;border:2px solid #F0E6C8}
.dash-card .num{font-family:var(--font-display);font-size:30px;color:var(--gather-deep)}
.dash-card .label{font-family:var(--font-display);font-size:14px;color:#666}
.cert-buttons{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.hidden{display:none !important}
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <div class="topbar">
      <button class="home-btn" onclick="goBack()" title="이전으로">←</button>
      <button class="home-btn" onclick="goHome()" title="처음으로">🏠</button>
      <div class="title">두 자리 덧셈과 뺄셈</div>
      <div class="progress"><div class="progress-fill" id="progress-fill"></div><div class="progress-label" id="progress-label">준비</div></div>
      <button class="toggle-btn" id="speaker-btn" onclick="toggleSpeaker()" title="소리 켜기/끄기">🔇</button>
    </div>
    <div id="screens"></div>
    <div class="feedback" id="feedback"><div class="feedback-card" id="feedback-card">잘했어요!</div></div>
    <div class="confetti hidden" id="confetti"></div>
    <div id="inquiry-mount"></div>
  </div>
</div>

<script>
// ============================================
// ⚙️ 0. GAS_URL — Apps Script 웹앱 주소 (배포 후 입력)
// ============================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyLhxVI3gsuTlBzQyIT2LxNBtVPUvQKT2C_ywleSZ3pKdJWMOG3gsRzRUfxk8etF79D/exec';

const FALLBACK_STUDENTS = [
  {no:1,name:'김일이',clazz:'1-1'},{no:2,name:'이십이',clazz:'1-1'},
  {no:3,name:'박자릿',clazz:'1-1'},{no:4,name:'최세로',clazz:'1-1'},{no:5,name:'한더하',clazz:'1-1'}
];
const FALLBACK_QUESTIONS = [
  // [도입] 받아올림 없는 두 자리 + 한 자리
  {stage:'gather-card',kind:'',a:23,b:4,target:27,meta:''},
  {stage:'gather-card',kind:'',a:35,b:2,target:37,meta:''},
  // [핵심1] 받아올림 없는 두 자리 + 두 자리
  {stage:'gather-card',kind:'',a:23,b:14,target:37,meta:''},
  {stage:'gather-card',kind:'',a:35,b:22,target:57,meta:''},
  {stage:'gather-card',kind:'',a:42,b:35,target:77,meta:''},
  // [핵심2] 받아올림 있는 두 자리 + 한 자리
  {stage:'gather-card',kind:'',a:28,b:5,target:33,meta:''},
  {stage:'gather-card',kind:'',a:37,b:8,target:45,meta:''},
  // [핵심3] 받아올림 있는 두 자리 + 두 자리
  {stage:'gather-card',kind:'',a:28,b:15,target:43,meta:''},
  {stage:'gather-card',kind:'',a:37,b:24,target:61,meta:''},
  // [핵심4] 받아내림 없는 두 자리 - 한/두 자리
  {stage:'split-card',kind:'',a:5,b:0,target:27,meta:''},
  {stage:'split-card',kind:'',a:23,b:0,target:47,meta:''},
  // [핵심5] 받아내림 있는 두 자리 - 한 자리
  {stage:'split-card',kind:'',a:5,b:0,target:32,meta:''},
  {stage:'split-card',kind:'',a:7,b:0,target:43,meta:''},
  // [핵심6] 받아내림 있는 두 자리 - 두 자리
  {stage:'split-card',kind:'',a:28,b:0,target:53,meta:''},
  {stage:'split-card',kind:'',a:37,b:0,target:64,meta:''},
  // [도전] □식 (양팔 저울)
  {stage:'split-card',kind:'',a:28,b:0,target:42,meta:''},
  {stage:'split-card',kind:'',a:35,b:0,target:51,meta:''},
  // [도전2] 합·차가 같은 식 (1학년 범위로 — 분지 트리는 작은 수가 적합)
  {stage:'gather-many',kind:'',a:0,b:0,target:15,meta:''},
  {stage:'gather-many',kind:'',a:0,b:0,target:17,meta:''},
  {stage:'split-many',kind:'',a:0,b:0,target:16,meta:''},
];

const APP_STATE = {
  speakerOn:false,micPermitted:false,micStream:null,
  students:[],questions:[],
  learnerName:'',learnerClass:'',chosenCount:5,
  preRecord:{text:'',audioBase64:null,helpCount:0,redoCount:0},
  postRecord:{text:'',audioBase64:null,helpCount:0,redoCount:0,stars:0,stickers:[]},
  correct:0,total:0,
  currentScreen:'mic',activityIdx:0,activityQueue:[],
};

window.addEventListener('load', async () => {
  setupScale();
  window.addEventListener('resize', setupScale);
  await bootstrapData();
  primeVoices();
  showScreen('mic');
});

// 반응형 scale (잘림·스크롤 X)
function setupScale(){
  const stage=document.getElementById('stage');
  const w=window.innerWidth,h=window.innerHeight;
  stage.style.transform=`scale(${Math.min(w/1280,h/800)})`;
}

async function bootstrapData(){
  if(GAS_URL){
    try{
      const r=await fetch(GAS_URL+'?action=bootstrap');
      const d=await r.json();
      if(d.ok){
        APP_STATE.students=d.students.length?d.students:FALLBACK_STUDENTS;
        APP_STATE.questions=d.questions.length?d.questions:FALLBACK_QUESTIONS;
        return;
      }
    }catch(e){console.warn('GAS 로드 실패',e);}
  }
  APP_STATE.students=FALLBACK_STUDENTS;
  APP_STATE.questions=FALLBACK_QUESTIONS;
}

// ============================================
// 🔊 1. TTS — 자연스러운 한국어 음성 우선
// ============================================
let CACHED_VOICE=null;
function primeVoices(){
  if(!('speechSynthesis' in window))return;
  if(speechSynthesis.getVoices().length===0){
    speechSynthesis.addEventListener('voiceschanged',selectBestVoice,{once:true});
  }else selectBestVoice();
}
function selectBestVoice(){
  const voices=speechSynthesis.getVoices();
  // 1순위: Google 한국어 클라우드 (가장 자연스러움)
  let v=voices.find(x=>x.lang==='ko-KR' && x.name.toLowerCase().includes('google') && !x.localService);
  // 2순위: Wavenet/Neural2
  if(!v) v=voices.find(x=>x.lang==='ko-KR' && /wavenet|neural|ko-kr-wavenet|ko-kr-neural/i.test(x.name));
  // 3순위: 자연스러움 키워드
  if(!v) v=voices.find(x=>x.lang==='ko-KR' && /wavenet|neural|premium|enhanced|natural/i.test(x.name));
  // 4순위: 아무 한국어 음성
  if(!v) v=voices.find(x=>x.lang==='ko-KR');
  CACHED_VOICE=v||null;
}
function speak(text,opts){
  if(!APP_STATE.speakerOn||!('speechSynthesis' in window))return Promise.resolve();
  opts=opts||{};
  return new Promise(resolve=>{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ko-KR'; u.rate=opts.rate||0.95; u.pitch=opts.pitch||1.0; u.volume=1.0;  // pitch 1.0 = 갈라짐 방지
    if(CACHED_VOICE)u.voice=CACHED_VOICE;
    u.onend=u.onerror=()=>resolve();
    speechSynthesis.speak(u);
  });
}

// TTS 글자 단위 하이라이트 (boundary 부정확 → setInterval로 글자 흐름)
async function speakWithHighlight(text,container){
  if(!APP_STATE.speakerOn||!container)return;
  const chars=[...text];
  container.innerHTML=chars.map((ch,i)=>
    /\s/.test(ch)?ch:`<span class="tts-char" data-i="${i}">${ch}</span>`).join('');
  return new Promise(resolve=>{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ko-KR'; u.rate=0.95; u.pitch=1.0;
    if(CACHED_VOICE)u.voice=CACHED_VOICE;
    let timer=null,startTime=null;
    const estimateMs=chars.length*120;
    u.onstart=()=>{
      startTime=Date.now();
      timer=setInterval(()=>{
        const elapsed=Date.now()-startTime;
        const idx=Math.floor((elapsed/estimateMs)*chars.length);
        container.querySelectorAll('.tts-char').forEach(s=>{
          s.classList.toggle('active', +s.dataset.i<=idx);
        });
      },40);
    };
    u.onend=u.onerror=()=>{
      if(timer)clearInterval(timer);
      container.querySelectorAll('.tts-char').forEach(s=>s.classList.add('active'));
      setTimeout(()=>container.querySelectorAll('.tts-char').forEach(s=>s.classList.remove('active')),500);
      resolve();
    };
    speechSynthesis.speak(u);
  });
}

function toggleSpeaker(){
  APP_STATE.speakerOn=!APP_STATE.speakerOn;
  const btn=document.getElementById('speaker-btn');
  btn.textContent=APP_STATE.speakerOn?'🔊':'🔇';
  btn.classList.toggle('active',APP_STATE.speakerOn);
  if(!APP_STATE.speakerOn)speechSynthesis.cancel();
}

// ============================================
// 🎵 2. 효과음 (스피커 ON일 때만)
// ============================================
let AUDIO_CTX=null;
function getAudio(){if(!AUDIO_CTX)AUDIO_CTX=new(window.AudioContext||window.webkitAudioContext)();return AUDIO_CTX;}
function playTone(freq,dur,type='sine',vol=0.3){
  if(!APP_STATE.speakerOn)return;
  try{
    const ctx=getAudio();const osc=ctx.createOscillator();const gain=ctx.createGain();
    osc.type=type;osc.frequency.value=freq;osc.connect(gain);gain.connect(ctx.destination);
    gain.gain.setValueAtTime(vol,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    osc.start();osc.stop(ctx.currentTime+dur);
  }catch(e){}
}
function sfxCorrect(){playTone(660,0.12,'sine',0.3);setTimeout(()=>playTone(880,0.18,'sine',0.3),120);}
function sfxWrong(){playTone(220,0.25,'sine',0.25);}
function sfxCheer(){playTone(523,0.10);setTimeout(()=>playTone(659,0.10),100);setTimeout(()=>playTone(784,0.20),200);}

// ============================================
// 🎊 3. 폭죽
// ============================================
function launchConfetti(count=40){
  const box=document.getElementById('confetti');
  box.classList.remove('hidden');box.innerHTML='';
  const colors=['#FFC23C','#FF6FA8','#5BB836','#3A8DDE','#FFE600','#9B59B6'];
  for(let i=0;i<count;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.left=(Math.random()*100)+'%';p.style.background=colors[i%colors.length];
    p.style.animationDelay=(Math.random()*0.4)+'s';
    p.style.transform=`rotate(${Math.random()*360}deg)`;
    box.appendChild(p);
  }
  setTimeout(()=>{box.classList.add('hidden');box.innerHTML='';},2200);
}

// ============================================
// 🎤 4. 마이크 허가 (앱 시작 시 1번만)
// ============================================
async function requestMicOnce(){
  if(APP_STATE.micPermitted)return true;
  try{
    const s=await navigator.mediaDevices.getUserMedia({audio:true});
    APP_STATE.micStream=s; APP_STATE.micPermitted=true;
    return true;
  }catch(e){console.warn('마이크 거부:',e);return false;}
}

// ============================================
// 📺 5. 화면 라우팅 (히스토리 + 뒤로가기)
// ============================================
const SCREEN_HISTORY = [];
function showScreen(id, addToHistory=true){
  if(addToHistory && APP_STATE.currentScreen && APP_STATE.currentScreen!==id){
    SCREEN_HISTORY.push(APP_STATE.currentScreen);
  }
  APP_STATE.currentScreen=id;
  const root=document.getElementById('screens');
  root.innerHTML='';
  const screen=document.createElement('div');
  screen.id='screen-'+id;
  let theme='intro';
  if(id==='activity'){
    const s=currentActivityQuestion()?.stage||'gather-same';
    if(s.startsWith('gather'))theme='gather';
    else if(s.startsWith('split'))theme='split';
    else theme='merge';
  }
  screen.className='screen active theme-'+theme;
  root.appendChild(screen);
  updateProgress();
  switch(id){
    case 'mic':renderMicGate(screen);break;
    case 'setup':renderSetup(screen);break;
    case 'intro':renderIntro(screen);break;
    case 'goals':renderGoals(screen);break;
    case 'inquiry-pre':renderInquiry('pre');break;
    case 'pre-record':renderRecord(screen,'pre');break;
    case 'inquiry-post':renderInquiry('post');break;
    case 'activity':renderActivity(screen);break;
    case 'post-record':renderRecord(screen,'post');break;
    case 'cert':renderCert(screen);break;
  }
}
function goBack(){
  if(SCREEN_HISTORY.length===0){goHome();return;}
  const prev=SCREEN_HISTORY.pop();
  showScreen(prev,false);
}
function updateProgress(){
  const t=APP_STATE.chosenCount,d=APP_STATE.activityIdx||0;
  document.getElementById('progress-fill').style.width=(t>0?(d/t)*100:0)+'%';
  document.getElementById('progress-label').textContent=APP_STATE.currentScreen==='activity'?`${d} / ${t}`:'준비';
}
function goHome(){
  if(!confirm('처음 화면으로 돌아갈까요?'))return;
  Object.assign(APP_STATE,{learnerName:'',correct:0,total:0,activityIdx:0,
    preRecord:{text:'',audioBase64:null,helpCount:0,redoCount:0},
    postRecord:{text:'',audioBase64:null,helpCount:0,redoCount:0,stars:0,stickers:[]}});
  showScreen('mic');

function prepareActivityQueue(){
  const allStages=['gather-same','gather-mixed','gather-card','gather-many','split-equal','split-card','split-many'];
  const byStage={};
  APP_STATE.questions.forEach(q=>{if(!byStage[q.stage])byStage[q.stage]=[];byStage[q.stage].push(q);});
  const queue=[];let round=0;
  while(queue.length<APP_STATE.chosenCount){
    for(const s of allStages){
      if(queue.length>=APP_STATE.chosenCount)break;
      if(byStage[s]?.length>0){queue.push(byStage[s][round%byStage[s].length]);}
    }
    round++; if(round>5)break;
  }
  APP_STATE.activityQueue=queue.slice(0,APP_STATE.chosenCount);
  APP_STATE.activityIdx=0;
}
function currentActivityQuestion(){return APP_STATE.activityQueue?APP_STATE.activityQueue[APP_STATE.activityIdx]:null;}

async function toggleRecord(phase){
  const btn=document.getElementById('rec-btn');
  const tutorial=document.getElementById('rec-tutorial');
  const sttDisplay=document.getElementById('stt-display');
  const sttText=document.getElementById('stt-text');
  const nextBtn=document.getElementById('next-btn');
  const rec=phase==='pre'?APP_STATE.preRecord:APP_STATE.postRecord;

  if(!mediaRecorder||mediaRecorder.state==='inactive'){
    if(!APP_STATE.micPermitted){
      const ok=await requestMicOnce();
      if(!ok){tutorial.textContent='⚠️ 마이크 없이도 건너뛰기로 진행할 수 있어요';return;}
    }
    try{
      let stream=APP_STATE.micStream;
      if(!stream||!stream.active){stream=await navigator.mediaDevices.getUserMedia({audio:true});APP_STATE.micStream=stream;}
      mediaRecorder=new MediaRecorder(stream);
      recordChunks=[];finalTranscript='';
      sttDisplay.style.visibility='visible';sttText.textContent='';
      mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recordChunks.push(e.data);};
      mediaRecorder.onstop=()=>{
        const blob=new Blob(recordChunks,{type:'audio/webm'});
        const reader=new FileReader();
        reader.onloadend=()=>{
          rec.audioBase64=reader.result;rec.text=sttText.textContent||'';
          tutorial.textContent='✨ 멋져요! 다음으로 가거나 다시 눌러 새로 녹음해요';
          if(nextBtn) nextBtn.style.display='';
        };
        reader.readAsDataURL(blob);
      };
      mediaRecorder.start();
      btn.classList.add('recording');
      tutorial.textContent='🔴 듣고 있어요… 다 했으면 다시 눌러요';

      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      if(SR){
        speechRecognition=new SR();
        speechRecognition.lang='ko-KR';speechRecognition.continuous=true;speechRecognition.interimResults=true;
        speechRecognition.onresult=(event)=>{
          let im='';
          for(let i=event.resultIndex;i<event.results.length;i++){
            const r=event.results[i];
            if(r.isFinal)finalTranscript+=r[0].transcript+' ';
            else im+=r[0].transcript;
          }
          sttText.textContent=cleanTranscript(finalTranscript)+(im?' '+im:'');
        };
        speechRecognition.onerror=(e)=>console.warn('STT:',e.error);
        speechRecognition.onend=()=>{};
        try{speechRecognition.start();}catch(e){}
      }
    }catch(err){tutorial.textContent='⚠️ 마이크 오류! 건너뛰기로 진행해 봐요';}
  }else{
    mediaRecorder.stop();btn.classList.remove('recording');
    if(speechRecognition){try{speechRecognition.stop();}catch(e){}speechRecognition=null;}
  }
}

function finishRecord(phase){

  if(speechRecognition){try{speechRecognition.stop();}catch(e){}speechRecognition=null;}
}

function renderActivity(root){
  const q=currentActivityQuestion();
  if(!q){showScreen('inquiry-post');return;}
  switch(q.stage){
    case 'gather-same': return drawGatherSimple(root,q,'같은 두 수를 모으면');
    case 'gather-mixed':return drawGatherSimple(root,q,'두 묶음을 모으면');
    case 'gather-card': return drawCardSum(root,q);
    case 'gather-many': return drawBranchMany(root,q,'gather');
    case 'split-equal': return drawSplitEqual(root,q);
    case 'split-card':  return drawSplitCard(root,q);
    case 'split-many':  return drawBranchMany(root,q,'split');
    default: nextActivity();
  }
}

// ⌨️ 키패드 — 직접 입력
// ============================================
let CURRENT_INPUT='';
let CURRENT_CHECK_FN=null;
let KEYPAD_LOCKED=false;
let CURRENT_ANSWER_DIGITS=1;

function renderKeypad(){
  return `<div class="keypad" id="keypad">
    ${[1,2,3,4,5,6,7,8,9,0].map(n=>`<button class="key" onclick="keyPress(${n})">${n}</button>`).join('')}
    <button class="key del" onclick="keyDel()">⌫</button>
    <button class="key check" id="check-btn" onclick="keyCheck()" disabled>확인 ✓</button>
  </div>`;
}

function keyPress(n){
  if(KEYPAD_LOCKED)return;
  if(CURRENT_INPUT.length>=CURRENT_ANSWER_DIGITS)return;  // 답 자릿수까지만 받음
  CURRENT_INPUT+=n;
  updateInputDisplay();
  playTone(800+n*30,0.05,'sine',0.2);
}
function keyDel(){
  if(KEYPAD_LOCKED)return;
  CURRENT_INPUT=CURRENT_INPUT.slice(0,-1);
  updateInputDisplay();
  playTone(400,0.05,'sine',0.15);
}
function keyCheck(){
  if(KEYPAD_LOCKED||!CURRENT_INPUT||!CURRENT_CHECK_FN)return;
  CURRENT_CHECK_FN(+CURRENT_INPUT);
}
function updateInputDisplay(){
  const slot=document.getElementById('answer-slot');
  if(!slot)return;
  const checkBtn=document.getElementById('check-btn');
  if(CURRENT_INPUT){
    slot.classList.remove('empty','input-active');
    slot.classList.add('input-active','filled-input');
    slot.textContent=CURRENT_INPUT;
    // 답 자릿수와 같을 때만 check 활성화
    if(checkBtn)checkBtn.disabled=(CURRENT_INPUT.length<CURRENT_ANSWER_DIGITS);
  }else{
    slot.classList.add('empty','input-active');
    slot.classList.remove('filled-input');
    slot.innerHTML='<span class="cursor-blink"></span>';
    if(checkBtn)checkBtn.disabled=true;
  }
}
function setupKeypadCheck(answer,motionFn){
  CURRENT_INPUT='';
  KEYPAD_LOCKED=false;
  CURRENT_ANSWER_DIGITS=String(answer).length;
  updateInputDisplay();
  CURRENT_CHECK_FN=async(val)=>{
    if(KEYPAD_LOCKED)return;
    if(val===answer){
      KEYPAD_LOCKED=true;
      const slot=document.getElementById('answer-slot');
      if(slot){
        slot.classList.remove('empty','input-active');
        slot.classList.add('filled','correct-fill');
        slot.textContent=answer;
      }
      sfxCorrect();recordCorrect();
      if(motionFn) await motionFn();
      setTimeout(()=>{showFeedback(true);setTimeout(nextActivity,800);},200);
    }else{
      sfxWrong();recordWrong();
      const slot=document.getElementById('answer-slot');
      if(slot){slot.classList.add('shake');setTimeout(()=>slot.classList.remove('shake'),500);}
      const sp=document.querySelector('.activity .speech');
      if(sp)sp.textContent='아쉬워! 차근차근 다시 세어 봐';
      // 입력 초기화
      CURRENT_INPUT='';
      setTimeout(()=>updateInputDisplay(),500);
    }
  };
}

    <style>@keyframes pv-pop{0%{transform:scale(.3);opacity:0}100%{transform:scale(1);opacity:1}}</style>
    <div style="display:flex;gap:20px;align-items:center;justify-content:center;padding:18px 8px;flex-wrap:wrap">

      ${tens>0 && ones>0?`<div style="font-family:var(--font-display);font-size:36px;color:#666">+</div>`:''}
      ${ones>0?`<div style="display:flex;flex-direction:column;align-items:center;gap:6px">

async function showCountPopup(itemSvgFn,count,opts={}){
  return new Promise(resolve=>{
    const popup=document.createElement('div');
    popup.className='count-popup'+(opts.split?' split-pop':'');
    const isLarge=count>20;
    if(isLarge){
      // 자릿값 시각화
      popup.innerHTML=`
        <div class="pop-title">${opts.title||'자릿값으로 볼까요?'}</div>
        ${placeValueHtml(count)}
        <div class="big-num show">${count}<span class="unit">이에요</span></div>`;
      document.body.appendChild(popup);
      (async()=>{
        await sleep(500);
        sfxCheer();
        if(APP_STATE.speakerOn)await speak(`모두 ${count}이에요`,{rate:0.95});
        await sleep(1500);
        popup.style.transition='opacity .4s, transform .4s';
        popup.style.opacity='0';popup.style.transform='translate(-50%,-50%) scale(.85)';
        await sleep(420);popup.remove();resolve();
      })();
      return;
    }
    // 작은 수: 기존 별 카운팅
    popup.innerHTML=`
      <div class="pop-title">${opts.title||'하나씩 세어 볼까요?'}</div>
      <div class="pop-items">
        ${[...Array(count)].map((_,i)=>`<span class="pop-item" data-i="${i}"><span class="num-tag">${i+1}</span>${itemSvgFn(i)}</span>`).join('')}
      </div>
      <div class="big-num" id="big-num-${Date.now()}"></div>`;
    document.body.appendChild(popup);
    (async()=>{
      await sleep(450);
      const items=popup.querySelectorAll('.pop-item');
      for(let i=0;i<items.length;i++){
        if(i>0)items[i-1].classList.remove('counting');
        items[i-1]?.classList.add('counted');
        items[i].classList.add('counting');
        playTone(440+i*80,0.15,'sine',0.3);
        if(APP_STATE.speakerOn)speak(KO_NUMS[i+1]||(i+1).toString(),{rate:1.15});
        await sleep(400);
      }
      items[items.length-1]?.classList.remove('counting');
      items[items.length-1]?.classList.add('counted');
      await sleep(250);
      const big=popup.querySelector('.big-num');
      big.innerHTML=`${count}<span class="unit">개</span>`;
      big.classList.add('show');
      sfxCheer();
      if(APP_STATE.speakerOn)await speak(`모두 ${count}개예요`,{rate:0.95});
      await sleep(1100);
      popup.style.transition='opacity .4s, transform .4s';
      popup.style.opacity='0';
      popup.style.transform='translate(-50%,-50%) scale(.85)';
      await sleep(420);
      popup.remove();
      resolve();
    })();
  });
}

      lefts[lefts.length-1]?.classList.remove('counting');
      lefts[lefts.length-1]?.classList.add('counted');
      await sleep(300);

        rights[i].classList.add('counting');
        playTone(440+i*80,0.15,'sine',0.3);
        if(APP_STATE.speakerOn)speak(KO_NUMS[i+1]||(i+1).toString(),{rate:1.15});
        await sleep(360);
      }
      rights[rights.length-1]?.classList.remove('counting');
      rights[rights.length-1]?.classList.add('counted');
      await sleep(300);
      const big=popup.querySelector('.big-num');
      big.innerHTML=`${leftCount} + ${rightCount} = ${total}`;

      sfxCheer();

      popup.style.opacity='0';
      popup.style.transform='translate(-50%,-50%) scale(.85)';
      await sleep(420);
      popup.remove();
      resolve();
    })();
  });
}

function showArena(arena){arena.style.opacity='1';arena.style.transform='translate(-50%,-50%) scale(1)';}
async function hideArena(arena){

// 슬롯(빈자리 + 번호 태그) 만들기
function makeArenaSlots(parent,count,tagColor='#FFC23C'){
  const slots=[];
  for(let i=0;i<count;i++){
    const sl=document.createElement('span');
    sl.style.cssText='position:relative;display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px';
    sl.innerHTML=`<span class="ar-num" style="position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-family:var(--font-display);font-size:20px;color:#fff;background:${tagColor};border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:3px solid #fff;box-shadow:0 2px 4px rgba(0,0,0,.2);opacity:0;transition:opacity .2s">${i+1}</span>`;
    parent.appendChild(sl);
    slots.push(sl);
  }
  return slots;
}

// 원본 .obj 들을 ghost로 복제 + 슬롯 위치로 이동 (원본은 fade-out)
function flyObjectsToSlots(objs,slotDivs){
  const ghosts=[];
  objs.forEach((obj,i)=>{
    if(i>=slotDivs.length)return;
    const oRect=obj.getBoundingClientRect();
    const g=document.createElement('span');
    g.style.cssText=`position:fixed;left:${oRect.left}px;top:${oRect.top}px;width:${oRect.width}px;height:${oRect.height}px;z-index:1600;pointer-events:none;transition:all .9s cubic-bezier(.5,0,.4,1) ${i*0.05}s;display:inline-block`;
    g.innerHTML=obj.innerHTML;
    document.body.appendChild(g);
    ghosts.push(g);
    obj.style.transition='opacity .3s';
    obj.style.opacity='0';
  });
  setTimeout(()=>{
    ghosts.forEach((g,i)=>{
      const sRect=slotDivs[i].getBoundingClientRect();
      g.style.left=(sRect.left+sRect.width/2-g.offsetWidth/2)+'px';
      g.style.top=(sRect.top+sRect.height/2-g.offsetHeight/2)+'px';
    });
  },30);
  return ghosts;
}

// ghosts 차례차례 카운트 (시각 + 음 + 음성)
async function countGhosts(ghosts,slotDivs){
  for(let i=0;i<ghosts.length;i++){
    if(i>0){ghosts[i-1].style.filter='';ghosts[i-1].style.transform='scale(1)';}
    ghosts[i].style.transition='all .2s';
    ghosts[i].style.filter='drop-shadow(0 0 14px #FFE600)';
    ghosts[i].style.transform='scale(1.35)';
    slotDivs[i].querySelector('.ar-num').style.opacity='1';
    playTone(440+i*80,0.15,'sine',0.3);
    if(APP_STATE.speakerOn)speak(KO_NUMS[i+1]||(i+1).toString(),{rate:1.15});
    await sleep(420);
  }
  ghosts[ghosts.length-1].style.filter='';
  ghosts[ghosts.length-1].style.transform='scale(1)';
  await sleep(250);
}

// ============================================
// ✨ 모션: 모으기 — 원본 객체가 그대로 arena로 날아가 카운팅
// ============================================
async function motionMergeObjects(root,svgFn,finalCount){
  const boxes=root.querySelectorAll('.activity-canvas > .objects-box');
  if(boxes.length<2)return;
  // 1. 떨림
  boxes.forEach(b=>b.classList.add('shake-prepare'));
  await sleep(360);
  boxes.forEach(b=>b.classList.remove('shake-prepare'));
  // 2. arena 등장
  const arena=createArena('#FFC23C','하나씩 세어 봐요');
  const slotRow=document.createElement('div');
  slotRow.style.cssText='display:flex;gap:14px;flex-wrap:wrap;justify-content:center;min-height:60px;padding:18px 14px;background:#FFFEF0;border-radius:14px;min-width:340px';
  arena.appendChild(slotRow);
  const slots=makeArenaSlots(slotRow,finalCount,'#FFC23C');
  await sleep(40);showArena(arena);
  await sleep(300);
  // 3. 원본 .obj → ghost로 복제 + 슬롯으로 이동
  const allObjs=[];
  boxes.forEach(b=>allObjs.push(...b.querySelectorAll('.obj')));
  const ghosts=flyObjectsToSlots(allObjs,slots);
  await sleep(900+ghosts.length*50);
  // 4. 차례차례 카운트
  await countGhosts(ghosts,slots);
  // 5. 빅 넘버
  if(APP_STATE.speakerOn)speak(`모두 ${finalCount}개`,{rate:.95});
  await showArenaBigNum(arena,`${finalCount}<span style="font-size:42px;color:#777">개</span>`);
  await sleep(700);
  // 6. ghost 사라짐 + arena 사라짐
  ghosts.forEach(g=>{g.style.transition='opacity .4s, transform .4s';g.style.opacity='0';g.style.transform=(g.style.transform||'')+' scale(.3)';});
  await hideArena(arena);
  ghosts.forEach(g=>g.remove());
  // 7. 답 슬롯 빵!
  const target=document.getElementById('answer-slot');
  if(target){
    target.style.transition='transform .5s cubic-bezier(.34,1.56,.64,1)';
    target.style.transform='scale(1.35)';
    target.style.boxShadow='0 0 50px rgba(255,230,0,.9)';
    await sleep(500);
    target.style.transform='scale(1)';target.style.boxShadow='';
  }
  launchConfetti(20);
}

  rightPlate.innerHTML=`<div style="font-family:var(--font-display);font-size:18px;color:#888;margin-bottom:4px">오른쪽</div>`;
  const rightSlotRow=document.createElement('div');
  rightSlotRow.style.cssText='display:flex;gap:10px;flex-wrap:wrap;justify-content:center;min-height:60px;padding:14px;background:#FFF5FA;border-radius:14px;min-width:140px';
  rightPlate.appendChild(rightSlotRow);
  const rightSlots=makeArenaSlots(rightSlotRow,rightCount,'#FF6FA8');
  twoPlates.appendChild(leftPlate);
  twoPlates.appendChild(plusSign);
  twoPlates.appendChild(rightPlate);
  await sleep(40);showArena(arena);
  await sleep(300);
  // 3. 원본 객체 → 양쪽 슬롯으로 ghost 이동
  const allObjs=[...source.querySelectorAll('.obj')];
  const ghosts=[];
  allObjs.forEach((obj,i)=>{
    const goLeft=i<halfCount;
    const slotIdx=goLeft?i:(i-halfCount);
    const slot=goLeft?leftSlots[slotIdx]:rightSlots[slotIdx];
    if(!slot)return;
    const oRect=obj.getBoundingClientRect();
    const g=document.createElement('span');
    g.style.cssText=`position:fixed;left:${oRect.left}px;top:${oRect.top}px;width:${oRect.width}px;height:${oRect.height}px;z-index:1600;pointer-events:none;transition:all 1.1s cubic-bezier(.4,0,.5,1) ${i*0.07}s;display:inline-block`;
    g.innerHTML=obj.innerHTML;
    g._targetSlot=slot;
    document.body.appendChild(g);
    ghosts.push(g);
    obj.style.transition='opacity .3s';
    obj.style.opacity='0';
  });
  setTimeout(()=>{
    ghosts.forEach((g,i)=>{
      const sRect=g._targetSlot.getBoundingClientRect();
      g.style.left=(sRect.left+sRect.width/2-g.offsetWidth/2)+'px';
      g.style.top=(sRect.top+sRect.height/2-g.offsetHeight/2)+'px';
    });
  },30);
  await sleep(1150+ghosts.length*70);
  // 4. 왼쪽 카운트
  const leftGhosts=ghosts.slice(0,halfCount);
  if(leftGhosts.length>0) await countGhosts(leftGhosts,leftSlots);
  // 5. 오른쪽 카운트
  const rightGhosts=ghosts.slice(halfCount);
  if(rightGhosts.length>0) await countGhosts(rightGhosts,rightSlots);
  // 6. 빅 넘버 — "halfCount + rightCount = total"
  if(APP_STATE.speakerOn)speak(`${halfCount} 더하기 ${rightCount}은 ${total}`,{rate:.95});
  await showArenaBigNum(arena,`${halfCount} + ${rightCount} = ${total}`,'var(--split-deep)');
  await sleep(900);
  // 7. 사라짐
  ghosts.forEach(g=>{g.style.transition='opacity .4s, transform .4s';g.style.opacity='0';g.style.transform=(g.style.transform||'')+' scale(.3)';});
  await hideArena(arena);
  ghosts.forEach(g=>g.remove());
  // 8. 실제 양쪽 접시에 객체 채우기 (다음 화면 잠깐)
  const lp=document.getElementById('left-plate'),rp=document.getElementById('right-plate');
  if(lp&&rp){
    lp.innerHTML=objsRow(svgFn,halfCount);
    rp.innerHTML=objsRow(svgFn,rightCount);
  }
  await sleep(200);
}

// ✨ 모션: 수 카드 두 개가 가운데로 합쳐짐 + 별 카운팅
// ============================================
async function motionMergeCards(root,finalCount){
  const tiles=[...root.querySelectorAll('.activity-canvas > .num-tile')].filter(t=>!t.classList.contains('target')&&!t.classList.contains('empty'));
  const target=document.getElementById('answer-slot');
  if(tiles.length<2||!target)return;
  const tRect=target.getBoundingClientRect();
  tiles.forEach(tile=>{
    const oRect=tile.getBoundingClientRect();
    const dx=(tRect.left+tRect.width/2)-(oRect.left+oRect.width/2);
    const dy=(tRect.top+tRect.height/2)-(oRect.top+oRect.height/2);
    tile.style.transition='transform 0.8s cubic-bezier(0.5,0,0.4,1), opacity 0.4s 0.5s';
    tile.style.transform=`translate(${dx}px,${dy}px) scale(0.7)`;
    tile.style.opacity='0';
  });
  setTimeout(()=>{target.style.boxShadow='0 0 40px rgba(255,230,0,0.8)';},600);
  await sleep(950);
  // 🆕 별 객체로 카운팅
  if(finalCount) await showCountPopup(STAR_SVG,finalCount,{title:'함께 세어 봐요'});
  target.style.boxShadow='';
}

async function motionSplitCard(root,total,a,answer){

  const targetCard=targetCards[0];
  if(!targetCard)return;
  targetCard.style.transition='all 0.5s cubic-bezier(0.5,0,0.4,1)';
  targetCard.style.boxShadow='0 0 40px rgba(255,230,0,0.9)';
  targetCard.style.transform='scale(1.15)';
  await sleep(450);
  targetCard.style.transform='scale(1)';
  const arrowEl=[...root.querySelectorAll('.activity-canvas > div')].find(d=>d.textContent&&d.textContent.includes('⇒'));

async function flyCardToSlot(card,slot,val){
  const cardRect=card.getBoundingClientRect();
  const slotRect=slot.getBoundingClientRect();
  const ghost=document.createElement('div');
  ghost.style.cssText=`position:fixed;left:${cardRect.left}px;top:${cardRect.top}px;width:${cardRect.width}px;height:${cardRect.height}px;background:linear-gradient(180deg,#FFEC9E,#FFC23C);border:4px solid #B58200;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:46px;color:#4A2C0E;z-index:9999;transition:all 0.6s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;`;
  ghost.textContent=val;
  document.body.appendChild(ghost);
  card.style.visibility='hidden';
  await sleep(20);
  ghost.style.left=slotRect.left+'px';
  ghost.style.top=slotRect.top+'px';
  ghost.style.width=slotRect.width+'px';
  ghost.style.height=slotRect.height+'px';
  ghost.style.fontSize=Math.round(slotRect.width*0.5)+'px';
  await sleep(620);
  ghost.remove();
  card.style.visibility='';
  slot.classList.remove('empty','active');
  slot.classList.add('filled');
  slot.textContent=val;
}

// 분지 트리 — 여러 가지 모으기/가르기
function drawBranchMany(root,q,mode){
  const target=q.target;
  // 옵션 카드 — 짝꿍 보장
  let opts=[];
  if(target<=10){
    // 작은 수: 1~(target-1) 전부 — 모든 짝꿍 표현 가능
    for(let i=1;i<target;i++)opts.push(i);
  } else if(target<=18){
    // 11~18: target-9 ~ 9 — 이 범위 안에서 모든 짝꿍 가능
    for(let i=Math.max(1,target-9); i<=Math.min(target-1,9); i++)opts.push(i);
    // 만약 5장 미만이면 추가 노이즈
    while(opts.length<5){const n=Math.floor(Math.random()*9)+1; if(opts.indexOf(n)<0)opts.push(n);}
  } else {
    // 19+: 짝꿍 한두 쌍 보장 + 노이즈
    const pairs=[];
    for(let i=Math.max(1,target-18); i<=Math.floor(target/2); i++){
      const j=target-i; if(j>0 && j<=18 && i<=18) pairs.push([i,j]);
    }
    // 짝꿍이 비어있으면 가장 작은 한 쌍 사용
    if(pairs.length===0){
      const half=Math.floor(target/2); pairs.push([half, target-half]);
    }
    const candidate=new Set();
    // 최소 2개 짝꿍 보장
    const picked=shuffleArr(pairs).slice(0, Math.min(2,pairs.length));
    picked.forEach(p=>{candidate.add(p[0]);candidate.add(p[1]);});
    // 노이즈: 짝꿍 옆 수
    picked.forEach(p=>{candidate.add(p[0]+1);candidate.add(p[1]-1);});
    opts=[...candidate].filter(x=>x>0 && x<target).slice(0,8);
    // 너무 적으면 추가
    while(opts.length<6){const n=Math.floor(Math.random()*(target-1))+1; if(opts.indexOf(n)<0)opts.push(n);}
  }
  opts=shuffleArr(opts);
  const isGather=mode==='gather';
  const svg=isGather
    ? `<svg class="tree-svg" viewBox="0 0 380 290" preserveAspectRatio="none"><path d="M60 100 L60 150 L320 150 L320 100" stroke="#FF6FA8" stroke-width="6" fill="none" stroke-linecap="round"/><path d="M190 150 L190 220" stroke="#FF6FA8" stroke-width="6" fill="none" stroke-linecap="round"/><polygon points="190,250 175,225 205,225" fill="#FF6FA8"/></svg>`
    : `<svg class="tree-svg" viewBox="0 0 380 290" preserveAspectRatio="none"><path d="M190 70 L190 130 L60 130 L60 170" stroke="#FF6FA8" stroke-width="6" fill="none" stroke-linecap="round"/><path d="M190 130 L320 130 L320 170" stroke="#FF6FA8" stroke-width="6" fill="none" stroke-linecap="round"/><polygon points="60,200 45,175 75,175" fill="#FF6FA8"/><polygon points="320,200 305,175 335,175" fill="#FF6FA8"/></svg>`;
  const slotsRow=`<div class="row" ${!isGather?'style="margin-top:30px"':''}><div class="slot empty">?</div><div class="slot empty">?</div></div>`;
  const targetRow=`<div class="row" ${isGather?'style="margin-top:30px"':''}><div class="anchor"${!isGather?' style="background:linear-gradient(180deg,#FFB1D2,#FF6FA8);color:#fff;border-color:#C73874"':''}>${target}</div></div>`;
  const treeRows=isGather?(slotsRow+targetRow):(targetRow+slotsRow);
  root.innerHTML=`
    <div class="activity">
      <div class="instruction" id="instr-text">${isGather?`👉 모아서 <span class="emph">${target}</span> 만들기`:`👉 <span class="emph">${target}</span>을 두 수로`}</div>
      <div class="activity-canvas" style="gap:60px">
        <div class="branch-tree">${svg}${treeRows}</div>
        <div class="option-panel">${opts.map(o=>`<div class="opt-card" data-val="${o}">${o}</div>`).join('')}</div>
      </div>
      <div class="tutorial-hint">👆 카드 → 빈칸 순서로 눌러요</div>
      <div class="mascot-corner">${isGather?svgMoEum(110):svgNaNum(110)}</div>
      <div class="speech">${isGather?`카드 두 장 골라 빈칸에 넣어 봐! 모으면 ${target}!`:`${target}은 어떤 두 수로? 카드 두 장 골라 봐!`}</div>
    </div>`;
  speakWithHighlight(isGather?`두 카드를 골라 ${target} 만들기`:`${target}을 두 수로 가르기`,document.getElementById('instr-text'));
  setTimeout(()=>{if(APP_STATE.speakerOn)speak(isGather?`카드 두 장을 골라서 빈칸에 넣어. 모으면 ${target}이 되어야 해.`:`${target}을 어떤 두 수로 갈라볼까? 카드 두 장을 골라 봐.`,{rate:1.0});},1700);
  bindBranchTree(root,target,isGather);
}

function bindBranchTree(root,target,isGather){
  let selOpt=null,selSlot=null,isPlacing=false;
  function clearOpt(){if(selOpt)selOpt.classList.remove('active');selOpt=null;}
  function clearSlot(){if(selSlot)selSlot.classList.remove('active');selSlot=null;}
  async function tryPlace(){
    if(!selOpt||!selSlot||isPlacing)return;
    const val=+selOpt.dataset.val;
    isPlacing=true;
    const card=selOpt,slot=selSlot;
    selOpt=null;selSlot=null;
    await flyCardToSlot(card,slot,val);
    isPlacing=false;
    const filledSlots=[...root.querySelectorAll('.slot.filled')];
    const sp=root.querySelector('.speech');
    if(filledSlots.length===1){
      // 첫 카드 — 짝꿍 힌트
      const needed=target-val;
      if(needed<=0){
        if(sp)sp.textContent=`${val}만으로는 ${target} 만들기 어려워. 더 작은 수로!`;
        sfxWrong();
        await sleep(1200);
        slot.classList.remove('filled');slot.classList.add('empty');slot.textContent='?';
        return;
      }
      if(sp)sp.textContent=`좋아! 짝꿍은 ${needed} 이야 — 이제 ${needed}를 골라 봐!`;
      playTone(660,0.14,'sine',0.3);
      if(APP_STATE.speakerOn)speak(`짝꿍은 ${needed}`,{rate:1.1});
      // 짝꿍 카드 잠깐 반짝
      const hintCard=[...root.querySelectorAll('.opt-card')].find(c=>+c.dataset.val===needed);
      if(hintCard){
        hintCard.style.transition='box-shadow .3s, transform .3s';
        hintCard.style.boxShadow='0 0 24px rgba(255,230,0,.95)';
        hintCard.style.transform='translateY(-4px) scale(1.05)';
        setTimeout(()=>{hintCard.style.boxShadow='';hintCard.style.transform='';},1800);
      }
    } else if(filledSlots.length>=2){
      // 두 카드 — 합 검증
      const vals=filledSlots.map(s=>+s.textContent);
      const sum=vals[0]+vals[1];
      if(sum===target){
        sfxCorrect();
        await sleep(400);
        await showBranchCount(target,vals[0],vals[1],isGather);
        recordCorrect();
        setTimeout(()=>{showFeedback(true);setTimeout(nextActivity,800);},200);
      }else{
        sfxWrong();
        if(sp)sp.textContent=`${vals[0]}이랑 ${vals[1]}을 모으면 ${sum}이 돼. ${target}이 되도록 다시!`;
        if(APP_STATE.speakerOn)speak(`다시 골라 봐`,{rate:1.1});
        // 슬롯 흔들렸다가 부드럽게 비움
        filledSlots.forEach(s=>s.classList.add('shake'));
        await sleep(700);
        filledSlots.forEach(s=>{
          s.style.transition='opacity .35s, transform .35s';
          s.style.opacity='0';s.style.transform='scale(.4)';
        });
        await sleep(380);
        filledSlots.forEach(s=>{
          s.classList.remove('filled','shake');s.classList.add('empty');
          s.textContent='?';s.style.opacity='';s.style.transform='';
        });
      }
    }
  }
  root.querySelectorAll('.opt-card').forEach(card=>{
    card.addEventListener('click',()=>{if(isPlacing)return;clearOpt();selOpt=card;card.classList.add('active');tryPlace();});
  });
  // 모든 슬롯에 항상 클릭 이벤트 (empty/filled 체크는 안에서)
  root.querySelectorAll('.slot').forEach(slot=>{
    slot.addEventListener('click',()=>{
      if(isPlacing||slot.classList.contains('filled'))return;
      clearSlot();selSlot=slot;slot.classList.add('active');tryPlace();
    });
  });
}

  const total=q.target,a=q.a,ans=total-a;
  const showVis=a<=10&&ans<=10;
  const visBlock=showVis?`<div style="display:flex;align-items:center;gap:18px;padding:12px 20px;background:rgba(255,255,255,.75);border:3px dashed var(--split-deep);border-radius:18px;margin:6px 0 4px;flex-wrap:wrap;justify-content:center;max-width:560px"><div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:230px">${Array.from({length:a},(_,i)=>`<div style="width:26px;height:26px;background:radial-gradient(circle at 35% 35%,#fff 6%,var(--split-accent) 60%);border:2px solid var(--split-deep);border-radius:50%;box-shadow:0 2px 4px rgba(0,0,0,.2)"></div>`).join('')}</div><div style="font-family:var(--font-display);font-size:18px;color:var(--split-deep)">${a}개</div></div><div style="font-family:var(--font-display);font-size:28px;color:#888">|</div><div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:230px">${Array.from({length:ans},()=>`<div style="width:26px;height:26px;background:#FFFDF0;border:2px dashed var(--split-deep);border-radius:50%"></div>`).join('')}</div><div style="font-family:var(--font-display);font-size:18px;color:#888">? 개</div></div></div>`:'';
  root.innerHTML=`
    <div class="activity has-keypad">
      <div class="instruction" id="instr-text">👉 <span class="emph">${total}</span>은 <span class="emph">${a}</span>과 어떤 수?</div>
      ${visBlock}
      <div class="activity-canvas" style="gap:18px">
        <div class="num-tile target">${total}</div>
        <div style="font-family:var(--font-display);font-size:60px;color:var(--split-deep)">⇒</div>
        <div class="num-tile">${a}</div>
        <div style="font-family:var(--font-display);font-size:48px;color:var(--split-deep)">과</div>
        <div class="num-tile target empty input-active" id="answer-slot"><span class="cursor-blink"></span></div>
      </div>
      <div class="tutorial-hint">👇 빈칸의 수를 입력해요</div>
      <div class="mascot-corner">${svgNaNum(110)}</div>
      <div class="speech">${total>=20?`${total}에서 ${a}을 빼 봐!`:`${a} 더하기 얼마?`}</div>
    </div>
    ${renderKeypad()}
  `;
  speakWithHighlight(`${total}은 ${a}과 무엇`,document.getElementById('instr-text'));
  setupKeypadCheck(ans,()=>total===10?motionBananaJump(root,a,ans,total):motionSplitCard(root,total,a,ans));
}

// ============================================
// 🏆 13. 임명장 + 대시보드 (사전·사후 비교)
// ============================================
function renderCert(root){
  launchConfetti(60);sfxCheer();
  const st=APP_STATE.postRecord.stickers.join(' ');
  root.innerHTML=`
    <div class="cert-wrap">
      <div class="cert-card">
        <h1>🌟 두 자리 덧뺄셈 임명장 🌟</h1>
        <div style="text-align:center"><div class="cert-name">${APP_STATE.learnerClass?APP_STATE.learnerClass+' ':''}${APP_STATE.learnerName}</div></div>
        <div class="cert-compare">
          <div class="cert-box pre">
            <h3>💡 활동 전 — 내가 아는 두 자리 덧뺄셈</h3>
            <p>${APP_STATE.preRecord.text||'(녹음하지 않았어요)'}</p>
          </div>
          <div class="cert-box post">
            <h3>🌟 활동 후 — 새롭게 알게 된 점</h3>
            <p>${APP_STATE.postRecord.text||'(녹음하지 않았어요)'}</p>
          </div>
        </div>
        <div class="dashboard">
          <div class="dash-card"><div class="num">${APP_STATE.correct}/${APP_STATE.total}</div><div class="label">📚 도전·정답</div></div>
          <div class="dash-card"><div class="num">${'★'.repeat(APP_STATE.postRecord.stars)}${'☆'.repeat(5-APP_STATE.postRecord.stars)}</div><div class="label">⭐ 자기평가</div></div>
          <div class="dash-card"><div class="num">${st||'—'}</div><div class="label">🎁 스티커</div></div>
          <div class="dash-card"><div class="num">${APP_STATE.preRecord.helpCount+APP_STATE.postRecord.helpCount}</div><div class="label">💡 도움받음</div></div>
        </div>
        <div style="text-align:center;font-family:var(--font-display);font-size:22px;color:#666;margin-top:6px">${getFinalMessage()}</div>
      </div>
      <div class="cert-buttons">
        <button class="big-btn" onclick="downloadCert()">📥 임명장 저장</button>
        <button class="big-btn green" onclick="goHome()">🔄 처음부터 다시</button>
      </div>
      <div class="mascot-corner">${svgMoEum(130)}</div>
      <div class="mascot-corner right">${svgNaNum(130)}</div>
      <div class="speech">정말 잘했어! 🎉</div>
    </div>`;
  speak('수료증을 받았어요. 정말 잘했어요');
}
function getFinalMessage(){
  const c=APP_STATE.correct,t=APP_STATE.total;
  if(t===0)return '💛 도전한 용기가 멋져요. 다음에 또 함께해요';
  if(c>=t*0.8)return '👑 환상적이에요! 두 자리 덧뺄셈을 잘 이해했어요';
  if(c>=t*0.5)return '🌈 잘 자라고 있어요! 더 도전해 봐요';
  return '💛 도전한 용기가 멋졌어요. 한 번 더 같이 해 봐요';
}
function downloadCert(){
  const canvas=document.createElement('canvas');canvas.width=1200;canvas.height=800;
  const ctx=canvas.getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,800);g.addColorStop(0,'#FFFEF0');g.addColorStop(1,'#FFF6D6');
  ctx.fillStyle=g;ctx.fillRect(0,0,1200,800);
  ctx.strokeStyle='#FFC23C';ctx.lineWidth=18;ctx.strokeRect(40,40,1120,720);
  ctx.fillStyle='#6B4A00';ctx.font='bold 64px Jua, sans-serif';ctx.textAlign='center';
  ctx.fillText('🌟 두 자리 덧뺄셈 임명장 🌟',600,160);
  ctx.font='bold 44px Jua, sans-serif';ctx.fillStyle='#2F7A12';
  ctx.fillText(APP_STATE.learnerName,600,250);
  ctx.font='bold 26px "Nanum Gothic", sans-serif';ctx.fillStyle='#333';
  ctx.fillText('일이와 십이의 자릿값 모험을 멋지게 마쳤어요!',600,320);
  ctx.font='22px "Nanum Gothic", sans-serif';ctx.fillStyle='#666';
  ctx.fillText(`📚 ${APP_STATE.correct}/${APP_STATE.total} 정답  ·  ⭐ ${APP_STATE.postRecord.stars}/5`,600,400);
  ctx.fillText(APP_STATE.postRecord.stickers.join(' ')||'',600,450);
  ctx.font='18px "Nanum Gothic", sans-serif';
  ctx.fillText(new Date().toLocaleDateString('ko-KR'),600,550);
  const link=document.createElement('a');
  link.download=`두자리_덧뺄셈_임명장_${APP_STATE.learnerName}.png`;
  link.href=canvas.toDataURL('image/png');link.click();
}
</script>
