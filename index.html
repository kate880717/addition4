// 🎯 차근차근 도전 (Speed Round) — 시간 제한 없이 5문제 연속
// 가벼운 별점 효과, 등급/순위 X
// ============================================
// ============================================
// 🎯 차근차근 도전 — 저학년 친화 (천천히 정확하게, 정답률 칭호, 오답 다시 풀기)
// 곱셈 앱 패턴 참고: 진행 바, 문항 수 선택, 오답 복습, 결과 칭호
// 1학년 적응: 시간 제한 제거, 보라색 → 노랑·남색, 등급 느낌 없는 응원 칭호
// ============================================
function drawSpeedRound(root,q){
  // 첫 진입 — 문항 수 선택
  if (!APP_STATE._speedState) {
    showSpeedSelect(root);
    return;
  }
  const st = APP_STATE._speedState;
  // 종료 처리
  if (st.idx >= st.queue.length) {
    if (st.wrongs.length > 0 && !st.reviewing) {
      st.reviewing = true;
      st.queue = st.wrongs.slice();
      st.wrongs = [];
      st.idx = 0;
      showSpeedReviewStart(root, st);
      return;
    }
    // 보너스 라운드 — 5문제 완주 + 오답 복습까지 끝 + 아직 보너스 미제안
    if (!st.bonusOffered && st.startCount === 5 && APP_STATE.total > 0) {
      st.bonusOffered = true;
      showBonusOffer(root, st);
      return;
    }
    showSpeedEnd(root, st);
    return;
  }
  const item = st.queue[st.idx];
  const ans = item.op === '－' ? (item.a - item.b) : (item.a + item.b);
  const total = st.queue.length;
  const progress = (st.idx / total) * 100;
  const digits = String(ans).length;
  root.innerHTML = `
    <div class="activity has-keypad" style="background:linear-gradient(180deg,#1A2438,#0A1024);color:#fff">
      <div style="display:flex;align-items:center;gap:12px;padding:12px 18px;background:rgba(255,255,255,.08);border-radius:14px;margin-bottom:10px">
        <span style="font-family:var(--font-display);font-size:17px;color:#FFE066;font-weight:bold;white-space:nowrap">🚀 ${st.reviewing?'복습!':'차근차근 도전'} ${st.idx+1}/${total}</span>
        <div style="flex:1;height:10px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${progress}%;background:linear-gradient(90deg,#FFE066,#FFC23C);border-radius:99px;transition:width .5s"></div>
        </div>
      </div>
      <div class="instruction" id="instr-text" style="background:rgba(255,230,0,.95);color:#222">⚡ 시간 제한 없어요! 천천히 정확하게</div>
      <div class="activity-canvas" style="gap:18px">
        <div class="num-tile" style="background:linear-gradient(180deg,#FFE066,#FFC23C);color:#222">${item.a}</div>
        <div style="font-family:var(--font-display);font-size:70px;color:#FFE066">${item.op||'＋'}</div>
        <div class="num-tile" style="background:linear-gradient(180deg,#FFE066,#FFC23C);color:#222">${item.b}</div>
        <div style="font-family:var(--font-display);font-size:70px;color:#FFE066">＝</div>
        <div class="num-tile target empty input-active" id="answer-slot" style="background:rgba(255,255,255,.1);border-color:#FFE066;color:#FFE066"><span class="cursor-blink"></span></div>
      </div>
      <div class="tutorial-hint" style="color:#FFE066;background:rgba(0,0,0,.3)">👇 키패드로 답을 입력해요</div>
      <div class="mascot-corner">${svgMoEum(100)}</div>
      <div class="speech" style="background:#FFE066;color:#222">${st.reviewing?'한 번 더!':(st.idx===0?'시작!':st.idx===Math.floor(total/2)?'반 왔어!':'잘하고 있어!')}</div>
    </div>
    ${renderKeypad()}
  `;
  speakWithHighlight(`${item.a} ${item.op==='－'?'빼기':'더하기'} ${item.b}`,document.getElementById('instr-text'));
  setupSpeedKeypad(ans, item, st, digits);
}

function setupSpeedKeypad(ans, item, st, digits) {
  // 기존 글로벌 키패드 시스템(.key, keyPress/keyDel/keyCheck) 호환
  CURRENT_INPUT = '';
  KEYPAD_LOCKED = false;
  CURRENT_ANSWER_DIGITS = digits;
  updateInputDisplay();
  CURRENT_CHECK_FN = async (val) => {
    if (KEYPAD_LOCKED) return;
    KEYPAD_LOCKED = true;
    const slot = document.getElementById('answer-slot');
    const ok = val === ans;
    if (slot) {
      slot.classList.remove('empty', 'input-active');
      slot.classList.add('filled');
      slot.textContent = val;
      slot.style.borderColor = ok ? '#5BB836' : '#FF6B6B';
      slot.style.background = ok ? 'rgba(91,184,54,.3)' : 'rgba(255,107,107,.3)';
      slot.style.color = ok ? '#5BB836' : '#FF6B6B';
    }
    if (ok) {
      st.correct++;
      sfxCorrect();
    } else {
      st.wrongs.push(item);
      sfxWrong();
      setTimeout(() => {
        if (slot) slot.textContent = ans;
        const sp = document.querySelector('.activity .speech');
        if (sp) { sp.textContent = `정답은 ${ans}이야!`; sp.style.background = '#FFC4C4'; }
      }, 600);
    }
    APP_STATE.correct += ok ? 1 : 0;
    APP_STATE.total++;
    await sleep(ok ? 900 : 1700);
    st.idx++;
    showScreen('activity');
  };
}

function generateSpeedProblems(count){
  const items = [];
  count = count || 5;
  if(typeof APP_PREFIX !== 'undefined'){
    if(APP_PREFIX === 'app1'){
      for(let i=0;i<count;i++){
        const a=Math.floor(Math.random()*5)+1;
        const b=Math.floor(Math.random()*5)+1;
        items.push({a,b,op:'＋'});
      }
    } else if(APP_PREFIX === 'app2'){
      const pairs=[[6,4],[7,3],[5,5],[8,2],[9,1],[4,6],[3,7],[2,8],[1,9]];
      for(let i=0;i<count;i++){
        const [a,b]=pairs[Math.floor(Math.random()*pairs.length)];
        items.push({a,b,op:'＋'});
      }
    } else if(APP_PREFIX === 'app3'){
      const types=[
        ()=>{const a=Math.floor(Math.random()*4)+6;const b=Math.floor(Math.random()*(15-a))+(11-a);return {a,b,op:'＋'};},
        ()=>{const total=Math.floor(Math.random()*7)+11;const b=Math.floor(Math.random()*6)+2;return {a:total,b,op:'－'};}
      ];
      for(let i=0;i<count;i++){
        const t=types[Math.floor(Math.random()*types.length)];
        items.push(t());
      }
    } else {
      for(let i=0;i<count;i++){
        const isAdd=Math.random()<0.5;
        if(isAdd){
          const a=Math.floor(Math.random()*40)+11;
          const b=Math.floor(Math.random()*20)+5;
          items.push({a,b,op:'＋'});
        } else {
          const total=Math.floor(Math.random()*60)+30;
          const b=Math.floor(Math.random()*20)+5;
          items.push({a:total,b,op:'－'});
        }
      }
    }
  }
  return items;
}

function drawBranchMany(root,q,mode){
  const target=q.target;
  // 옵션 카드 — 짝꿍 보장
  let opts=[];
  if(target<=10){
    // 작은 수: 1~(target-1) 전부 — 모든 짝꿍 표현 가능
    for(let i=1;i<target;i++)opts.push(i);
  } else if(target<=18){
    // 11~18: target-9 ~ 9 — 이 범위 안에서 모든 짝꿍 가능
    for(let i=Math.max(1,target-9); i<=Math.min(target-1,9); i++)opts.push(i);
    // 만약 5장 미만이면 추가 노이즈
    while(opts.length<5){const n=Math.floor(Math.random()*9)+1; if(opts.indexOf(n)<0)opts.push(n);}
  } else {
    // 19+: 짝꿍 한두 쌍 보장 + 노이즈
    const pairs=[];
    for(let i=Math.max(1,target-18); i<=Math.floor(target/2); i++){
      const j=target-i; if(j>0 && j<=18 && i<=18) pairs.push([i,j]);
    }
    // 짝꿍이 비어있으면 가장 작은 한 쌍 사용
    if(pairs.length===0){
      const half=Math.floor(target/2); pairs.push([half, target-half]);
    }
    const candidate=new Set();
    // 최소 2개 짝꿍 보장
    const picked=shuffleArr(pairs).slice(0, Math.min(2,pairs.length));
    picked.forEach(p=>{candidate.add(p[0]);candidate.add(p[1]);});
    // 노이즈: 짝꿍 옆 수
    picked.forEach(p=>{candidate.add(p[0]+1);candidate.add(p[1]-1);});
    opts=[...candidate].filter(x=>x>0 && x<target).slice(0,8);
    // 너무 적으면 추가
    while(opts.length<6){const n=Math.floor(Math.random()*(target-1))+1; if(opts.indexOf(n)<0)opts.push(n);}
  }
  opts=shuffleArr(opts);
  const isGather=mode==='gather';
  const svg=isGather
    ? `<svg class="tree-svg" viewBox="0 0 380 290" preserveAspectRatio="none"><path d="M60 100 L60 150 L320 150 L320 100" stroke="#FF6FA8" stroke-width="6" fill="none" stroke-linecap="round"/><path d="M190 150 L190 220" stroke="#FF6FA8" stroke-width="6" fill="none" stroke-linecap="round"/><polygon points="190,250 175,225 205,225" fill="#FF6FA8"/></svg>`
    : `<svg class="tree-svg" viewBox="0 0 380 290" preserveAspectRatio="none"><path d="M190 70 L190 130 L60 130 L60 170" stroke="#FF6FA8" stroke-width="6" fill="none" stroke-linecap="round"/><path d="M190 130 L320 130 L320 170" stroke="#FF6FA8" stroke-width="6" fill="none" stroke-linecap="round"/><polygon points="60,200 45,175 75,175" fill="#FF6FA8"/><polygon points="320,200 305,175 335,175" fill="#FF6FA8"/></svg>`;
  const slotsRow=`<div class="row" ${!isGather?'style="margin-top:30px"':''}><div class="slot empty">?</div><div class="slot empty">?</div></div>`;
  const targetRow=`<div class="row" ${isGather?'style="margin-top:30px"':''}><div class="anchor"${!isGather?' style="background:linear-gradient(180deg,#FFB1D2,#FF6FA8);color:#fff;border-color:#C73874"':''}>${target}</div></div>`;
  const treeRows=isGather?(slotsRow+targetRow):(targetRow+slotsRow);
  root.innerHTML=`
    <div class="activity">
      <div class="instruction" id="instr-text">${isGather?`👉 두 수를 모아 <span class="t-num">${target}</span> 만들기`:`👉 <span class="t-num">${target}</span>${josaReul(target)} 두 수로 갈라요`}</div>
      <div class="activity-canvas" style="gap:60px">
        <div class="branch-tree">${svg}${treeRows}</div>
        <div class="option-panel">${opts.map(o=>`<div class="opt-card" data-val="${o}">${o}</div>`).join('')}</div>
      </div>
      <div class="tutorial-hint">👆 카드 → 빈칸 순서로 눌러요</div>
      <div class="mascot-corner">${isGather?svgMoEum(110):svgNaNum(110)}</div>
      <div class="speech">${isGather?`카드 두 장으로 <span class="t-num">${target}</span> 만들기!`:`<span class="t-num">${target}</span>${josaUn(target)} 어떤 두 수로?`}</div>
    </div>`;
  speakWithHighlight(isGather?`두 카드를 골라 ${target} 만들기`:`${target}을 두 수로 가르기`,document.getElementById('instr-text'));
  setTimeout(()=>{if(APP_STATE.speakerOn)speak(isGather?`카드 두 장을 골라서 빈칸에 넣어. 모으면 ${target}이 되어야 해.`:`${target}을 어떤 두 수로 갈라볼까? 카드 두 장을 골라 봐.`,{rate:1.0});},1700);
  bindBranchTree(root,target,isGather);
}

function bindBranchTree(root,target,isGather){
  let selOpt=null,selSlot=null,isPlacing=false;
  function clearOpt(){if(selOpt)selOpt.classList.remove('active');selOpt=null;}
  function clearSlot(){if(selSlot)selSlot.classList.remove('active');selSlot=null;}
  async function tryPlace(){
    if(!selOpt||!selSlot||isPlacing)return;
    const val=+selOpt.dataset.val;
    isPlacing=true;
    const card=selOpt,slot=selSlot;
    selOpt=null;selSlot=null;
    await flyCardToSlot(card,slot,val);
    isPlacing=false;
    const filledSlots=[...root.querySelectorAll('.slot.filled')];
    const sp=root.querySelector('.speech');
    if(filledSlots.length===1){
      // 첫 카드 — 짝꿍 힌트
      const needed=target-val;
      if(needed<=0){
        if(sp)sp.textContent=`${val}만으로는 ${target} 만들기 어려워. 더 작은 수로!`;
        sfxWrong();
        await sleep(1200);
        slot.classList.remove('filled');slot.classList.add('empty');slot.textContent='?';
        return;
      }
      if(sp)sp.textContent=`좋아! 짝꿍은 ${needed} 이야 — 이제 ${needed}를 골라 봐!`;
      playTone(660,0.14,'sine',0.3);
      if(APP_STATE.speakerOn)speak(`짝꿍은 ${needed}`,{rate:1.1});
      // 짝꿍 카드 잠깐 반짝
      const hintCard=[...root.querySelectorAll('.opt-card')].find(c=>+c.dataset.val===needed);
      if(hintCard){
        hintCard.style.transition='box-shadow .3s, transform .3s';
        hintCard.style.boxShadow='0 0 24px rgba(255,230,0,.95)';
        hintCard.style.transform='translateY(-4px) scale(1.05)';
        setTimeout(()=>{hintCard.style.boxShadow='';hintCard.style.transform='';},1800);
      }
    } else if(filledSlots.length>=2){
      // 두 카드 — 합 검증
      const vals=filledSlots.map(s=>+s.textContent);
      const sum=vals[0]+vals[1];
      if(sum===target){
        sfxCorrect();
        await sleep(400);
        await showBranchCount(target,vals[0],vals[1],isGather);
        recordCorrect();
        setTimeout(()=>{showFeedback(true);setTimeout(nextActivity,800);},200);
      }else{
        sfxWrong();
        if(sp)sp.textContent=`${vals[0]}이랑 ${vals[1]}을 모으면 ${sum}이 돼. ${target}이 되도록 다시!`;
        if(APP_STATE.speakerOn)speak(`다시 골라 봐`,{rate:1.1});
        // 슬롯 흔들렸다가 부드럽게 비움
        filledSlots.forEach(s=>s.classList.add('shake'));
        await sleep(700);
        filledSlots.forEach(s=>{
          s.style.transition='opacity .35s, transform .35s';
          s.style.opacity='0';s.style.transform='scale(.4)';
        });
        await sleep(380);
        filledSlots.forEach(s=>{
          s.classList.remove('filled','shake');s.classList.add('empty');
          s.textContent='?';s.style.opacity='';s.style.transform='';
        });
      }
    }
  }
  root.querySelectorAll('.opt-card').forEach(card=>{
    card.addEventListener('click',()=>{if(isPlacing)return;clearOpt();selOpt=card;card.classList.add('active');tryPlace();});
  });
  // 모든 슬롯에 항상 클릭 이벤트 (empty/filled 체크는 안에서)
  root.querySelectorAll('.slot').forEach(slot=>{
    slot.addEventListener('click',()=>{
      if(isPlacing||slot.classList.contains('filled'))return;
      clearSlot();selSlot=slot;slot.classList.add('active');tryPlace();
    });
  });
}

// 🏆 13. 임명장 + 대시보드 (사전·사후 비교)
// ============================================
function renderCert(root){
  launchConfetti(60);sfxCheer();
  const st=APP_STATE.postRecord.stickers.join(' ');
  root.innerHTML=`
    <div class="cert-wrap">
      <div class="cert-card">
        <h1>🌟 두 자리 덧뺄셈 임명장 🌟</h1>
        <div style="text-align:center"><div class="cert-name">${APP_STATE.learnerClass?APP_STATE.learnerClass+' ':''}${APP_STATE.learnerName}</div></div>
        <div class="cert-compare">
          <div class="cert-box pre">
            <h3>💡 활동 전 — 내가 아는 두 자리 덧뺄셈</h3>
            <p>${APP_STATE.preRecord.text||'(녹음하지 않았어요)'}</p>
          </div>
          <div class="cert-box post">
            <h3>🌟 활동 후 — 새롭게 알게 된 점</h3>
            <p>${APP_STATE.postRecord.text||'(녹음하지 않았어요)'}</p>
          </div>
        </div>
        <div class="dashboard">
          <div class="dash-card"><div class="num">${APP_STATE.correct}/${APP_STATE.total}</div><div class="label">📚 도전·정답</div></div>
          <div class="dash-card"><div class="num">${'★'.repeat(APP_STATE.postRecord.stars)}${'☆'.repeat(5-APP_STATE.postRecord.stars)}</div><div class="label">⭐ 자기평가</div></div>
          <div class="dash-card"><div class="num">${st||'—'}</div><div class="label">🎁 스티커</div></div>
          <div class="dash-card"><div class="num">${APP_STATE.preRecord.helpCount+APP_STATE.postRecord.helpCount}</div><div class="label">💡 도움받음</div></div>
        </div>
        <div class="cert-collection">
          <h3 style="text-align:center;font-family:var(--font-display);font-size:22px;color:#444;margin:14px 0 10px">🎨 오늘의 도감</h3>
          <div class="collection-grid">${renderCollection()}</div>
        </div>
        <div style="text-align:center;font-family:var(--font-display);font-size:22px;color:#666;margin-top:14px">${getFinalMessage()}</div>
      </div>
      <div class="cert-buttons">
        <button class="big-btn" onclick="downloadCert()">📥 임명장 저장</button>
        <button class="big-btn green" onclick="goHome()">🔄 처음부터 다시</button>
      </div>
      <div class="mascot-corner"><div class="mascot-with-cap">${svgMoEum(130)}<svg class="grad-cap-svg" viewBox="-40 -22 80 30"><polygon points="-32,-2 32,-2 28,-10 -28,-10" fill="#2A2A4A" stroke="#1A1A30" stroke-width="1"/><rect x="-34" y="-2" width="68" height="5" fill="#2A2A4A" rx="1"/><line x1="18" y1="-4" x2="34" y2="-18" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/><circle cx="34" cy="-18" r="5" fill="#FFD700" stroke="#D4A800" stroke-width="1.5"/></svg></div></div>
      <div class="mascot-corner right"><div class="mascot-with-cap">${svgNaNum(130)}<svg class="ribbon-svg" viewBox="-30 -8 60 16"><path d="M -22 0 Q -10 -7 0 0 Q 10 -7 22 0 Q 10 7 0 0 Q -10 7 -22 0 Z" fill="#FF6FA8" stroke="#C73874" stroke-width="1.5"/><circle cx="0" cy="0" r="3" fill="#FFD700"/></svg></div></div>
      <div class="speech">정말 잘했어! 🎉</div>
    </div>`;
  speak('수료증을 받았어요. 정말 잘했어요');
}
function renderCollection(){
  // 이 앱에서 사용된 카테고리 추출
  const usedCats=[...new Set(APP_STATE.questions.map(q=>STAGE_CATEGORY[q.stage]).filter(Boolean))];
  const collected=new Set(APP_STATE.collected||[]);
  return usedCats.map(cat=>{
    const info=CATEGORY_INFO[cat];
    const done=collected.has(cat);
    return `<div class="coll-item ${done?'on':''}" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;border-radius:14px;background:${done?'linear-gradient(180deg,#FFE066,#FFC23C)':'#F0F0F0'};border:3px solid ${done?'#E8B100':'#D0D0D0'};opacity:${done?'1':'.4'};transition:all .3s">
      <div style="font-size:34px;filter:${done?'none':'grayscale(1)'}">${info.icon}</div>
      <div style="font-family:var(--font-display);font-size:13px;color:${done?'#5A3A00':'#999'};font-weight:bold">${info.label}</div>
    </div>`;
  }).join('');
}
function getFinalMessage(){
  const c=APP_STATE.correct,t=APP_STATE.total;
  if(t===0)return '💛 도전한 용기가 멋져요. 다음에 또 함께해요';
  if(c>=t*0.8)return '👑 환상적이에요! 두 자리 덧뺄셈을 잘 이해했어요';
  if(c>=t*0.5)return '🌈 잘 자라고 있어요! 더 도전해 봐요';
  return '💛 도전한 용기가 멋졌어요. 한 번 더 같이 해 봐요';
}
function downloadCert(){
  const canvas=document.createElement('canvas');canvas.width=1200;canvas.height=800;
  const ctx=canvas.getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,800);g.addColorStop(0,'#FFFEF0');g.addColorStop(1,'#FFF6D6');
  ctx.fillStyle=g;ctx.fillRect(0,0,1200,800);
  ctx.strokeStyle='#FFC23C';ctx.lineWidth=18;ctx.strokeRect(40,40,1120,720);
  ctx.fillStyle='#6B4A00';ctx.font='bold 64px Jua, sans-serif';ctx.textAlign='center';
  ctx.fillText('🌟 두 자리 덧뺄셈 임명장 🌟',600,160);
  ctx.font='bold 44px Jua, sans-serif';ctx.fillStyle='#2F7A12';
  ctx.fillText(APP_STATE.learnerName,600,250);
  ctx.font='bold 26px "Nanum Gothic", sans-serif';ctx.fillStyle='#333';
  ctx.fillText('일이와 십이의 자릿값 모험을 멋지게 마쳤어요!',600,320);
  ctx.font='22px "Nanum Gothic", sans-serif';ctx.fillStyle='#666';
  ctx.fillText(`📚 ${APP_STATE.correct}/${APP_STATE.total} 정답  ·  ⭐ ${APP_STATE.postRecord.stars}/5`,600,400);
  ctx.fillText(APP_STATE.postRecord.stickers.join(' ')||'',600,450);
  ctx.font='18px "Nanum Gothic", sans-serif';
  ctx.fillText(new Date().toLocaleDateString('ko-KR'),600,550);
  const link=document.createElement('a');
  link.download=`두자리_덧뺄셈_임명장_${APP_STATE.learnerName}.png`;
  link.href=canvas.toDataURL('image/png');link.click();
}
</script>
</body>
</html>
